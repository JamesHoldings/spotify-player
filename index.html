<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Compact Pro - Synced</title>
    <style>
        :root {
            --sp-green: #1DB954;
            --bg-main: #181818;
            --bg-card: #282828;
            --bg-elevated: #303030;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        * { box-sizing: border-box; }

        body {
            background: transparent;
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #player-container {
            position: relative;
            width: 380px;
            padding: 14px 14px 12px;
            border-radius: 16px;
            background: radial-gradient(circle at top left, #404040 0, #202020 35%, #121212 100%);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .top-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            grid-column-gap: 12px;
            align-items: center;
        }

        #album-art {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            background-color: #121212;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.6);
        }

        .meta { min-width: 0; }

        #track-name {
            font-size: 0.9rem;
            font-weight: 600;
            margin: 0 0 2px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #artist-name {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin: 0 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #device-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        #device-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1.25rem;
            padding: 4px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease;
        }

        #device-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--sp-green);
            transform: translateY(-1px);
        }

        #device-menu {
            position: absolute;
            top: 56px;
            right: 10px;
            background: var(--bg-elevated);
            border-radius: 10px;
            width: 200px;
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.95);
            z-index: 100;
            padding: 6px;
            border: 1px solid #3a3a3a;
            max-height: 140px;
            overflow-y: auto;
        }

        .device-option {
            padding: 7px 9px;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: #fff;
            text-align: left;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.15s ease;
        }

        .device-option:hover { background: #3b3b3b; color: var(--sp-green); }

        .active-device { color: var(--sp-green); font-weight: 600; }

        #progress-row { display: flex; align-items: center; gap: 8px; margin-top: -2px; }

        #time-current, #time-total { font-size: 0.7rem; color: var(--text-dim); min-width: 34px; text-align: center; }

        #progress-container {
            position: relative;
            flex: 1;
            height: 4px;
            background: #3d3d3d;
            border-radius: 999px;
            cursor: pointer;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffffff, var(--sp-green));
            border-radius: inherit;
            position: relative;
        }

        #progress-thumb {
            position: absolute;
            right: 0;
            top: 50%;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            transform: translate(50%, -50%);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.18);
        }

        .bottom-row { display: flex; align-items: center; justify-content: space-between; margin-top: 3px; }

        .controls { display: flex; align-items: center; gap: 8px; }

        .btn-nav {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        #play-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.9);
        }

        #status-chip {
            font-size: 0.7rem;
            color: var(--text-dim);
            background: rgba(0, 0, 0, 0.35);
            border-radius: 999px;
            padding: 2px 8px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        #status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--sp-green);
            box-shadow: 0 0 10px rgba(29, 185, 84, 0.9);
        }

        #status-chip.offline #status-dot { background: #ff4f4f; box-shadow: none; }

        #login-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(0, 0, 0, 0.3), rgba(5, 5, 5, 0.96));
            border-radius: inherit;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 18px;
            backdrop-filter: blur(12px);
        }

        .login-btn {
            background: var(--sp-green);
            color: black;
            border: none;
            padding: 9px 22px;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>

<div id="player-container">
    
    <div class="top-row">
        <div id="album-art"></div>
        <div class="meta">
            <p id="track-name">Nothing Playing</p>
            <p id="artist-name">Ready & Synced</p>
            <div id="device-label">No active device</div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
            <div id="status-chip" class="offline">
                <div id="status-dot"></div>
                <span id="status-text">Disconnected</span>
            </div>
            <button id="device-btn" onclick="toggleDevices()">📱</button>
        </div>
        <div id="device-menu"></div>
    </div>

    <div id="progress-row">
        <span id="time-current">0:00</span>
        <div id="progress-container">
            <div id="progress-bar"><div id="progress-thumb"></div></div>
        </div>
        <span id="time-total">0:00</span>
    </div>

    <div class="bottom-row">
        <div class="controls">
            <button class="btn-nav" onclick="handlePrevious()">⏮</button>
            <button class="btn-nav" onclick="handleNext()">⏭</button>
        </div>
        <button id="play-btn" onclick="handlePlayToggle()">▶</button>
    </div>
</div>

<script src="https://sdk.scdn.co/spotify-player.js"></script>
<script>
    const clientId = 'ccb3b4e6e11b48fc9ba11bc154e65534';
    const redirectUri = window.location.origin + window.location.pathname;

    let player = null;
    let currentDurationMs = 0;
    let lastKnownPositionMs = 0;
    let pollIntervalId = null;
    let progressTickerId = null;
    let isScrubbing = false;

    // --- PKCE Helpers ---
    const generateRandomString = (l) => Array.from(crypto.getRandomValues(new Uint8Array(l))).map(x => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'[x % 62]).join('');
    const sha256 = async (plain) => window.crypto.subtle.digest('SHA-256', new TextEncoder().encode(plain));
    const base64encode = (input) => btoa(String.fromCharCode(...new Uint8Array(input))).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');

    async function redirectToAuth() {
        const v = generateRandomString(64);
        const hashed = await sha256(v);
        const c = base64encode(hashed);
        localStorage.setItem('code_verifier', v);
        const params = new URLSearchParams({
            response_type: 'code', client_id: clientId,
            scope: 'streaming user-read-playback-state user-modify-playback-state',
            code_challenge_method: 'S256', code_challenge: c, redirect_uri: redirectUri
        });
        window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
    }

    async function getToken(code) {
        const v = localStorage.getItem('code_verifier');
        const response = await fetch('https://accounts.spotify.com/api/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ client_id: clientId, grant_type: 'authorization_code', code, redirect_uri: redirectUri, code_verifier: v })
        });
        return await response.json();
    }

    async function ensureValidToken() {
        let token = localStorage.getItem('access_token');
        const expiresAt = parseInt(localStorage.getItem('token_expires_at') || '0');
        if (!token || Date.now() > (expiresAt - 60000)) {
            const refreshToken = localStorage.getItem('refresh_token');
            if (!refreshToken) return null;
            const res = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ client_id: clientId, grant_type: 'refresh_token', refresh_token: refreshToken })
            });
            const data = await res.json();
            if (data.access_token) {
                token = data.access_token;
                localStorage.setItem('access_token', token);
                localStorage.setItem('token_expires_at', String(Date.now() + (data.expires_in * 1000)));
            }
        }
        return token;
    }

    async function apiFetch(url, options = {}) {
        const token = await ensureValidToken();
        if (!token) { showLoginOverlay(true); return null; }
        const res = await fetch(url, { ...options, headers: { 'Authorization': `Bearer ${token}`, ...(options.body ? { 'Content-Type': 'application/json' } : {}), ...(options.headers || {}) }});
        if (res.status === 401) { showLoginOverlay(true); return null; }
        return res.status === 204 ? {} : res.json();
    }

    function showLoginOverlay(show) {
        document.getElementById('login-overlay').style.display = show ? 'flex' : 'none';
        const chip = document.getElementById('status-chip');
        const text = document.getElementById('status-text');
        if (show) { chip.classList.add('offline'); text.textContent = 'Disconnected'; stopPolling(); }
        else { chip.classList.remove('offline'); text.textContent = 'Connected'; startPolling(); }
    }

    function applyApiState(data) {
        if (!data || !data.item) return;
        const track = data.item;
        document.getElementById('track-name').textContent = track.name;
        document.getElementById('artist-name').textContent = track.artists[0].name;
        document.getElementById('album-art').style.backgroundImage = `url(${track.album.images[0].url})`;
        document.getElementById('play-btn').textContent = data.is_playing ? '⏸' : '▶';
        document.getElementById('device-label').textContent = data.device ? `On ${data.device.name}` : '';
        
        currentDurationMs = track.duration_ms;
        lastKnownPositionMs = data.progress_ms;
        updateProgressUI(lastKnownPositionMs, currentDurationMs);
        data.is_playing ? startProgressTicker() : stopProgressTicker();
    }

    function startProgressTicker() {
        stopProgressTicker();
        progressTickerId = setInterval(() => {
            if (!isScrubbing) {
                lastKnownPositionMs = Math.min(lastKnownPositionMs + 1000, currentDurationMs);
                updateProgressUI(lastKnownPositionMs, currentDurationMs);
            }
        }, 1000);
    }

    function stopProgressTicker() { clearInterval(progressTickerId); }

    async function pollPlaybackState() {
        const data = await apiFetch('https://api.spotify.com/v1/me/player');
        if (data && data.item) applyApiState(data);
    }

    function startPolling() { stopPolling(); pollIntervalId = setInterval(pollPlaybackState, 3000); pollPlaybackState(); }
    function stopPolling() { clearInterval(pollIntervalId); stopProgressTicker(); }

    async function handlePlayToggle() {
        const data = await apiFetch('https://api.spotify.com/v1/me/player');
        const method = data && data.is_playing ? 'PUT' : 'PUT';
        const endpoint = data && data.is_playing ? 'pause' : 'play';
        await apiFetch(`https://api.spotify.com/v1/me/player/${endpoint}`, { method });
        setTimeout(pollPlaybackState, 500);
    }

    async function handleNext() { await apiFetch('https://api.spotify.com/v1/me/player/next', { method: 'POST' }); setTimeout(pollPlaybackState, 500); }
    async function handlePrevious() { await apiFetch('https://api.spotify.com/v1/me/player/previous', { method: 'POST' }); setTimeout(pollPlaybackState, 500); }

    function updateProgressUI(pos, dur) {
        const ratio = dur ? (pos / dur) * 100 : 0;
        document.getElementById('progress-bar').style.width = `${ratio}%`;
        document.getElementById('time-current').textContent = formatTime(pos);
        document.getElementById('time-total').textContent = formatTime(dur);
    }

    function formatTime(ms) {
        const s = Math.floor(ms / 1000);
        return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
    }

    async function toggleDevices() {
        const menu = document.getElementById('device-menu');
        if (menu.style.display === 'flex') { menu.style.display = 'none'; return; }
        const data = await apiFetch('https://api.spotify.com/v1/me/player/devices');
        if (!data) return;
        menu.innerHTML = data.devices.map(d => `<button class="device-option ${d.is_active ? 'active-device' : ''}" onclick="transferPlayback('${d.id}')">${d.name}</button>`).join('');
        menu.style.display = 'flex';
    }

    async function transferPlayback(id) {
        await apiFetch('https://api.spotify.com/v1/me/player', { method: 'PUT', body: JSON.stringify({ device_ids: [id] })});
        document.getElementById('device-menu').style.display = 'none';
        setTimeout(pollPlaybackState, 500);
    }

    function attachScrubHandlers() {
        const container = document.getElementById('progress-container');
        container.onmousedown = (e) => {
            isScrubbing = true;
            const rect = container.getBoundingClientRect();
            const pos = Math.floor(((e.clientX - rect.left) / rect.width) * currentDurationMs);
            apiFetch(`https://api.spotify.com/v1/me/player/seek?position_ms=${pos}`, { method: 'PUT' });
            lastKnownPositionMs = pos;
            updateProgressUI(pos, currentDurationMs);
        };
        window.onmouseup = () => isScrubbing = false;
    }

    async function init() {
        const code = new URLSearchParams(window.location.search).get('code');
        if (code) {
            const data = await getToken(code);
            if (data.access_token) {
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                localStorage.setItem('token_expires_at', String(Date.now() + (data.expires_in * 1000)));
                window.history.replaceState({}, document.title, window.location.pathname);
                showLoginOverlay(false);
            }
        } else {
            const token = await ensureValidToken();
            showLoginOverlay(!token);
        }
        attachScrubHandlers();
    }

    window.onSpotifyWebPlaybackSDKReady = () => {
        player = new Spotify.Player({
            name: 'James Dashboard',
            getOAuthToken: async cb => { const t = await ensureValidToken(); if (t) cb(t); }
        });
        player.addListener('ready', () => { showLoginOverlay(false); startPolling(); });
        player.addListener('authentication_error', () => showLoginOverlay(true));
        player.connect();
    };

    init();
</script>
</body>
</html>
