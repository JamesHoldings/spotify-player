<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Compact Pro</title>
    <style>
        :root { 
            --sp-green: #1DB954; 
            --bg-grey: #282828; 
            --text-main: #ffffff; 
            --text-dim: #b3b3b3; 
            --hover-bg: #333333;
        }
        body { 
            background: transparent; 
            color: var(--text-main); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        #player-container { 
            background: var(--bg-grey); 
            width: 360px; 
            padding: 15px; 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.5); 
            position: relative;
        }

        .top-row { 
            display: flex; 
            gap: 12px; 
            align-items: center; 
            position: relative; 
        }
        
        #album-art { 
            width: 64px; 
            height: 64px; 
            border-radius: 4px; 
            background-size: cover; 
            background-color: #121212; 
            flex-shrink: 0; 
        }
        
        .meta { 
            flex-grow: 1; 
            overflow: hidden; 
        }
        
        #track-name { 
            font-size: 0.9rem; 
            font-weight: bold; 
            margin: 0; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        
        #artist-name { 
            font-size: 0.8rem; 
            color: var(--text-dim); 
            margin: 2px 0 0 0; 
        }
        
        #context-label { 
            font-size: 0.7rem; 
            color: var(--text-dim); 
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Device Selection UI */
        #device-btn { 
            background: none; 
            border: none; 
            color: var(--text-dim); 
            cursor: pointer; 
            font-size: 1.2rem; 
            transition: 0.2s; 
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        #device-btn:hover { 
            background: var(--hover-bg);
            color: var(--sp-green); 
        }
        
        #device-menu { 
            position: absolute; 
            top: 100%; 
            right: 0; 
            background: #333; 
            border-radius: 8px; 
            width: 220px; 
            display: none; 
            flex-direction: column; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            z-index: 100; 
            padding: 8px 0;
            margin-top: 5px; 
            border: 1px solid #444;
            max-height: 150px;
            overflow-y: auto;
        }
        
        #device-menu::-webkit-scrollbar {
            width: 4px;
        }
        #device-menu::-webkit-scrollbar-thumb {
            background: #666;
            border-radius: 4px;
        }
        
        .device-option { 
            padding: 10px 12px; 
            font-size: 0.8rem; 
            cursor: pointer; 
            border: none; 
            background: none; 
            color: white; 
            text-align: left; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: 0.1s;
            border-left: 3px solid transparent;
        }
        
        .device-option:hover { 
            background: #444; 
            border-left-color: var(--sp-green);
        }
        
        .active-device { 
            color: var(--sp-green); 
            font-weight: bold;
            background: rgba(29,185,84,0.1);
        }

        .menu-header {
            font-size: 0.65rem;
            color: var(--text-dim);
            padding: 5px 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Progress Bar */
        #progress-container { 
            width: 100%; 
            height: 4px; 
            background: #4d4d4d; 
            border-radius: 2px; 
            cursor: pointer;
            position: relative;
        }
        
        #progress-container:hover {
            height: 6px;
        }
        
        #progress-bar { 
            width: 0%; 
            height: 100%; 
            background: var(--sp-green); 
            border-radius: 2px; 
            transition: width 0.2s ease;
            pointer-events: none;
        }

        .bottom-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        
        .controls { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        
        .btn-nav { 
            background: none; 
            border: none; 
            color: var(--text-main); 
            cursor: pointer; 
            font-size: 1.2rem; 
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.1s;
        }
        
        .btn-nav:hover {
            background: var(--hover-bg);
            color: var(--sp-green);
        }
        
        #play-btn { 
            background: white; 
            color: black; 
            border: none; 
            width: 34px; 
            height: 34px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            font-size: 1rem;
            transition: transform 0.1s;
        }
        
        #play-btn:hover {
            transform: scale(1.05);
        }
        
        #time-display { 
            font-size: 0.75rem; 
            color: var(--text-dim); 
            font-variant-numeric: tabular-nums;
            min-width: 70px;
            text-align: center;
        }
        
        #login-overlay { 
            position: absolute; 
            inset: 0; 
            background: var(--bg-grey); 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 200; 
            flex-direction: column;
            gap: 15px;
        }

        #login-overlay button {
            background: var(--sp-green); 
            border: none; 
            padding: 12px 24px; 
            border-radius: 30px; 
            font-weight: bold; 
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.1s;
        }

        #login-overlay button:hover {
            transform: scale(1.05);
        }

        #active-device-name {
            font-size: 0.7rem;
            color: var(--sp-green);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <div id="player-container">
        <div id="login-overlay" style="display:none;">
            <div style="text-align: center; margin-bottom: 10px;">🔊 Connect to Spotify</div>
            <button onclick="redirectToAuth()">Connect Spotify</button>
        </div>

        <div class="top-row">
            <div id="album-art"></div>
            <div class="meta">
                <p id="track-name">Paused</p>
                <p id="artist-name">Ready</p>
                <p id="context-label">My Liked Songs</p>
                <div id="active-device-name"></div>
            </div>
            <button id="device-btn" onclick="toggleDevices()">📱</button>
            <div id="device-menu"></div>
        </div>

        <div id="progress-container" onclick="seekFromProgress(event)">
            <div id="progress-bar"></div>
        </div>

        <div class="bottom-row">
            <div class="controls">
                <button class="btn-nav" onclick="handlePrevious()">⏮</button>
                <button class="btn-nav" onclick="handleNext()">⏭</button>
                <div id="time-display">0:00</div>
            </div>
            <button id="play-btn" onclick="handlePlayPause()">▶</button>
        </div>
    </div>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script>
        // ==================== CONFIGURATION ====================
        const clientId = 'ccb3b4e6e11b48fc9ba11bc154e65534';
        const redirectUri = window.location.origin + window.location.pathname;
        
        // ==================== STATE MANAGEMENT ====================
        let player = null;
        let lastState = null;
        let pollInterval = null;

        // ==================== PKCE AUTH FLOW ====================
        function generateRandomString(length) {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            return Array.from(crypto.getRandomValues(new Uint8Array(length)))
                .map(x => possible[x % possible.length])
                .join('');
        }

        async function sha256(plain) {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        }

        function base64encode(buffer) {
            return btoa(String.fromCharCode(...new Uint8Array(buffer)))
                .replace(/=/g, '')
                .replace(/\+/g, '-')
                .replace(/\//g, '_');
        }

        window.redirectToAuth = async function() {
            const verifier = generateRandomString(64);
            const hash = await sha256(verifier);
            const challenge = base64encode(hash);
            
            localStorage.setItem('code_verifier', verifier);
            
            const params = new URLSearchParams({
                response_type: 'code',
                client_id: clientId,
                scope: 'streaming user-read-playback-state user-modify-playback-state user-read-currently-playing',
                code_challenge_method: 'S256',
                code_challenge: challenge,
                redirect_uri: redirectUri
            });
            
            window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
        };

        // ==================== TOKEN HANDLING ====================
        async function handleAuthCode(code) {
            const verifier = localStorage.getItem('code_verifier');
            
            try {
                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: clientId,
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: redirectUri,
                        code_verifier: verifier
                    })
                });
                
                const data = await response.json();
                if (data.access_token) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.removeItem('code_verifier');
                    
                    // Clean URL
                    window.history.replaceState({}, document.title, window.location.pathname);
                    
                    // Hide login overlay
                    document.getElementById('login-overlay').style.display = 'none';
                    
                    // Initialize everything
                    initializePlayer();
                    startPolling();
                }
            } catch (error) {
                console.error('Token exchange failed:', error);
            }
        }

        // ==================== API HELPERS ====================
        async function spotifyFetch(endpoint, method = 'GET', body = null) {
            const token = localStorage.getItem('access_token');
            if (!token) return null;

            const options = {
                method,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            };

            if (body) {
                options.body = JSON.stringify(body);
            }

            try {
                const response = await fetch(`https://api.spotify.com/v1/${endpoint}`, options);
                if (response.status === 401) {
                    // Token expired
                    localStorage.removeItem('access_token');
                    document.getElementById('login-overlay').style.display = 'flex';
                    return null;
                }
                return response;
            } catch (error) {
                console.error('API error:', error);
                return null;
            }
        }

        // ==================== DEVICE MANAGEMENT ====================
        window.toggleDevices = async function() {
            const menu = document.getElementById('device-menu');
            
            if (menu.style.display === 'flex') {
                menu.style.display = 'none';
                return;
            }

            const response = await spotifyFetch('me/player/devices');
            if (!response) return;

            const data = await response.json();
            
            menu.innerHTML = '<div class="menu-header">AVAILABLE DEVICES</div>';
            
            if (!data.devices || data.devices.length === 0) {
                menu.innerHTML += '<div class="device-option" style="cursor:default; color:#999;">No devices found</div>';
            } else {
                data.devices.forEach(device => {
                    const item = document.createElement('button');
                    item.className = `device-option ${device.is_active ? 'active-device' : ''}`;
                    
                    // Device icon based on type
                    let icon = '📱';
                    if (device.type === 'Computer') icon = '💻';
                    else if (device.type === 'Speaker') icon = '🔊';
                    else if (device.type === 'TV') icon = '📺';
                    
                    item.innerHTML = `<span>${icon} ${device.name}</span> <span>${device.is_active ? '●' : ''}</span>`;
                    item.onclick = () => transferPlayback(device.id);
                    menu.appendChild(item);
                });
            }
            
            menu.style.display = 'flex';
        };

        async function transferPlayback(deviceId) {
            await spotifyFetch('me/player', 'PUT', {
                device_ids: [deviceId],
                play: true
            });
            
            document.getElementById('device-menu').style.display = 'none';
            
            // Refresh device name
            setTimeout(refreshPlaybackState, 500);
        }

        // Close device menu when clicking outside
        window.addEventListener('click', (e) => {
            const menu = document.getElementById('device-menu');
            const btn = document.getElementById('device-btn');
            if (!e.target.closest('#device-btn') && !e.target.closest('#device-menu')) {
                menu.style.display = 'none';
            }
        });

        // ==================== PLAYBACK CONTROLS ====================
        window.handlePlayPause = async function() {
            const response = await spotifyFetch('me/player');
            if (!response) return;
            
            if (response.status === 204) {
                // No active device - try to use SDK
                if (player) player.togglePlay();
                return;
            }
            
            const data = await response.json();
            if (data.is_playing) {
                await spotifyFetch('me/player/pause', 'PUT');
            } else {
                await spotifyFetch('me/player/play', 'PUT');
            }
            
            setTimeout(refreshPlaybackState, 200);
        };

        window.handleNext = async function() {
            await spotifyFetch('me/player/next', 'POST');
            setTimeout(refreshPlaybackState, 300);
        };

        window.handlePrevious = async function() {
            await spotifyFetch('me/player/previous', 'POST');
            setTimeout(refreshPlaybackState, 300);
        };

        window.seekFromProgress = async function(event) {
            const container = document.getElementById('progress-container');
            const rect = container.getBoundingClientRect();
            const ratio = Math.min(1, Math.max(0, (event.clientX - rect.left) / rect.width));
            
            const response = await spotifyFetch('me/player');
            if (!response) return;
            
            if (response.ok) {
                const data = await response.json();
                if (data.item && data.item.duration_ms) {
                    const positionMs = Math.floor(ratio * data.item.duration_ms);
                    await spotifyFetch(`me/player/seek?position_ms=${positionMs}`, 'PUT');
                    setTimeout(refreshPlaybackState, 200);
                }
            }
        };

        // ==================== STATE REFRESH ====================
        async function refreshPlaybackState() {
            const response = await spotifyFetch('me/player');
            
            if (!response || response.status === 204) {
                document.getElementById('track-name').innerText = 'No active device';
                document.getElementById('artist-name').innerText = 'Play something on Spotify';
                document.getElementById('context-label').innerText = '';
                document.getElementById('active-device-name').innerText = '';
                document.getElementById('album-art').style.backgroundImage = '';
                document.getElementById('play-btn').innerText = '▶';
                document.getElementById('progress-bar').style.width = '0%';
                document.getElementById('time-display').innerText = '0:00';
                return;
            }
            
            const state = await response.json();
            
            // Update track info
            if (state.item) {
                document.getElementById('track-name').innerText = state.item.name;
                document.getElementById('artist-name').innerText = state.item.artists.map(a => a.name).join(', ');
                document.getElementById('album-art').style.backgroundImage = `url(${state.item.album.images[0]?.url || ''})`;
                
                // Update context (playlist/album name)
                if (state.context) {
                    const contextUrl = state.context.href;
                    if (contextUrl.includes('playlist')) document.getElementById('context-label').innerText = '📋 Playlist';
                    else if (contextUrl.includes('album')) document.getElementById('context-label').innerText = '💿 Album';
                    else if (contextUrl.includes('artist')) document.getElementById('context-label').innerText = '🎤 Artist Radio';
                }
            }
            
            // Update play button
            document.getElementById('play-btn').innerText = state.is_playing ? '⏸' : '▶';
            
            // Update progress
            if (state.item?.duration_ms) {
                const pos = state.progress_ms || 0;
                const dur = state.item.duration_ms;
                const percent = (pos / dur) * 100;
                document.getElementById('progress-bar').style.width = percent + '%';
                
                const posMin = Math.floor(pos / 60000);
                const posSec = Math.floor((pos % 60000) / 1000);
                const durMin = Math.floor(dur / 60000);
                const durSec = Math.floor((dur % 60000) / 1000);
                document.getElementById('time-display').innerText = 
                    `${posMin}:${posSec.toString().padStart(2,'0')} / ${durMin}:${durSec.toString().padStart(2,'0')}`;
            }
            
            // Update active device name
            if (state.device) {
                document.getElementById('active-device-name').innerText = `🔊 ${state.device.name}`;
            }
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            refreshPlaybackState();
            pollInterval = setInterval(refreshPlaybackState, 3000);
        }

        // ==================== SPOTIFY SDK ====================
        function initializePlayer() {
            const token = localStorage.getItem('access_token');
            if (!token) return;

            player = new Spotify.Player({
                name: 'Compact Pro Player',
                getOAuthToken: cb => cb(token),
                volume: 0.8
            });

            player.addListener('ready', ({ device_id }) => {
                console.log('SDK ready with device ID:', device_id);
            });

            player.addListener('player_state_changed', state => {
                if (!state) return;
                lastState = state;
                
                // Use SDK for instant UI updates
                const track = state.track_window.current_track;
                if (track) {
                    document.getElementById('track-name').innerText = track.name;
                    document.getElementById('artist-name').innerText = track.artists.map(a => a.name).join(', ');
                    if (track.album.images[0]) {
                        document.getElementById('album-art').style.backgroundImage = `url(${track.album.images[0].url})`;
                    }
                }
                
                document.getElementById('play-btn').innerText = state.paused ? '▶' : '⏸';
                
                if (state.duration > 0) {
                    const percent = (state.position / state.duration) * 100;
                    document.getElementById('progress-bar').style.width = percent + '%';
                    
                    const posMin = Math.floor(state.position / 60000);
                    const posSec = Math.floor((state.position % 60000) / 1000);
                    const durMin = Math.floor(state.duration / 60000);
                    const durSec = Math.floor((state.duration % 60000) / 1000);
                    document.getElementById('time-display').innerText = 
                        `${posMin}:${posSec.toString().padStart(2,'0')} / ${durMin}:${durSec.toString().padStart(2,'0')}`;
                }
            });

            player.connect();
        }

        // ==================== INITIALIZATION ====================
        async function init() {
            // Check for auth code in URL
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            
            if (code) {
                await handleAuthCode(code);
            }
            
            // Check for existing token
            const token = localStorage.getItem('access_token');
            if (token) {
                document.getElementById('login-overlay').style.display = 'none';
                initializePlayer();
                startPolling();
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
            }
        }

        // Start everything
        init();
    </script>
</body>
</html>
