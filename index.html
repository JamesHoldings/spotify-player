<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Compact Pro</title>
    <style>
        :root { --sp-green: #1DB954; --bg-grey: #282828; --text-main: #ffffff; --text-dim: #b3b3b3; }
        body { background: transparent; color: var(--text-main); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #player-container { 
            background: var(--bg-grey); width: 360px; padding: 15px; border-radius: 12px; 
            display: flex; flex-direction: column; gap: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); position: relative;
        }

        .top-row { display: flex; gap: 12px; align-items: center; position: relative; }
        #album-art { width: 64px; height: 64px; border-radius: 4px; background-size: cover; background-color: #121212; flex-shrink: 0; }
        
        .meta { flex-grow: 1; overflow: hidden; }
        #track-name { font-size: 0.9rem; font-weight: bold; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #artist-name { font-size: 0.8rem; color: var(--text-dim); margin: 2px 0 0 0; }

        /* DEVICE PANEL ADJUSTMENTS */
        #device-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.2rem; }
        
        #device-menu { 
            position: absolute; 
            bottom: 40px; /* Positioned higher above the bottom bar */
            right: 10px; 
            background: #333; 
            border-radius: 8px; 
            width: 180px; 
            display: none; 
            flex-direction: column; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
            z-index: 100; 
            padding: 5px; 
            border: 1px solid #444;
            /* Shorter Height */
            max-height: 120px; 
            overflow-y: auto;
        }

        /* Slim Scrollbar */
        #device-menu::-webkit-scrollbar { width: 4px; }
        #device-menu::-webkit-scrollbar-thumb { background: #666; border-radius: 10px; }

        .device-option { padding: 8px; font-size: 0.75rem; cursor: pointer; border-radius: 4px; border: none; background: none; color: white; text-align: left; width: 100%; display: flex; justify-content: space-between; }
        .device-option:hover { background: #444; color: var(--sp-green); }
        .active-device { color: var(--sp-green); font-weight: bold; }

        #progress-container { width: 100%; height: 4px; background: #4d4d4d; border-radius: 2px; }
        #progress-bar { width: 0%; height: 100%; background: var(--text-main); border-radius: 2px; }

        .bottom-row { display: flex; align-items: center; justify-content: space-between; }
        .controls { display: flex; align-items: center; gap: 15px; }
        .btn-nav { background: none; border: none; color: var(--text-main); cursor: pointer; font-size: 1.2rem; }
        #play-btn { background: white; color: black; border: none; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #time-display { font-size: 0.75rem; color: var(--text-dim); }
    </style>
</head>
<body>

    <div id="player-container">
        <div class="top-row">
            <div id="album-art"></div>
            <div class="meta">
                <p id="track-name">Paused</p>
                <p id="artist-name">Ready</p>
            </div>
            <button id="device-btn" onclick="toggleDevices()">📱</button>
            <div id="device-menu"></div>
        </div>

        <div id="progress-container"><div id="progress-bar"></div></div>

        <div class="bottom-row">
            <div class="controls">
                <button class="btn-nav" onclick="player.previousTrack()">⏮</button>
                <button class="btn-nav" onclick="player.nextTrack()">⏭</button>
                <div id="time-display">0:00</div>
            </div>
            <button id="play-btn" onclick="player.togglePlay()">▶</button>
        </div>
    </div>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script>
        const clientId = 'ccb3b4e6e11b48fc9ba11bc154e65534';
        const accessToken = localStorage.getItem('access_token');
        let player;

        // --- IMPROVED DEVICE TRANSFER ---
        async function transferPlayback(deviceId) {
            // Setting 'play: true' ensures the music starts immediately on the new device
            await fetch('https://api.spotify.com/v1/me/player', {
                method: 'PUT',
                body: JSON.stringify({ device_ids: [deviceId], play: true }),
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}` }
            });
            document.getElementById('device-menu').style.display = 'none';
        }

        async function toggleDevices() {
            const menu = document.getElementById('device-menu');
            if (menu.style.display === 'flex') { menu.style.display = 'none'; return; }
            
            const res = await fetch('https://api.spotify.com/v1/me/player/devices', {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const data = await res.json();
            
            menu.innerHTML = '';
            data.devices.forEach(d => {
                const item = document.createElement('button');
                item.className = `device-option ${d.is_active ? 'active-device' : ''}`;
                item.innerHTML = `<span>${d.name}</span> <span>${d.is_active ? '●' : ''}</span>`;
                item.onclick = () => transferPlayback(d.id);
                menu.appendChild(item);
            });
            menu.style.display = 'flex';
        }

        window.onSpotifyWebPlaybackSDKReady = () => {
            player = new Spotify.Player({ name: 'James Dashboard', getOAuthToken: cb => cb(accessToken) });
            
            player.addListener('player_state_changed', state => {
                if (!state) return;
                const track = state.track_window.current_track;
                document.getElementById('track-name').innerText = track.name;
                document.getElementById('artist-name').innerText = track.artists[0].name;
                document.getElementById('album-art').style.backgroundImage = `url(${track.album.images[0].url})`;
                document.getElementById('play-btn').innerText = state.paused ? '▶' : '⏸';
                document.getElementById('progress-bar').style.width = (state.position / state.duration) * 100 + '%';
            });

            player.connect();
        };
    </script>
</body>
</html>
