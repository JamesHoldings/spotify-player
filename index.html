<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Compact Pro – fully synced + compact</title>
    <style>
        /* --- reset & design tokens --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --sp-green: #1DB954;
            --bg-grey: #181818;        /* darker, more modern */
            --widget-bg: #282828;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --cover-size: 60px;         /* slightly smaller for compactness */
            --border-panel: #3a3a3a;
        }

        body {
            background: transparent;
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* main widget – now even tighter */
        #player-container {
            background: var(--widget-bg);
            width: 340px;                /* slightly narrower = compact */
            padding: 14px 14px 12px 14px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            position: relative;
            border: 1px solid #404040;
            backdrop-filter: blur(2px);
            transition: all 0.2s ease;
        }

        /* top row */
        .top-row {
            display: flex;
            gap: 12px;
            align-items: center;
            position: relative;
        }

        #album-art {
            width: var(--cover-size);
            height: var(--cover-size);
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            background-color: #121212;
            flex-shrink: 0;
            box-shadow: 0 6px 12px rgba(0,0,0,0.6);
            transition: box-shadow 0.2s;
        }

        .meta {
            flex-grow: 1;
            overflow: hidden;
            min-width: 0;
        }

        #track-name {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 0 0 3px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.1px;
        }

        #artist-name {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 400;
        }

        /* device button – refined */
        #device-btn {
            background: rgba(255,255,255,0.06);
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 1.4rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
            line-height: 1;
        }
        #device-btn:hover {
            background: rgba(255,255,255,0.15);
            color: white;
            transform: scale(1.05);
        }

        /* --- DEVICE MENU – drastically shorter height + perfectly scrollable --- */
        #device-menu {
            position: absolute;
            bottom: 42px;                /* sits just above bottom controls */
            right: -4px;
            background: #1a1a1a;
            border-radius: 18px;
            width: 240px;
            display: none;
            flex-direction: column;
            box-shadow: 0 20px 35px rgba(0,0,0,0.8);
            z-index: 300;
            padding: 6px 0;
            border: 1px solid #4c4c4c;
            backdrop-filter: blur(8px);
            background: rgba(28,28,28,0.98);

            /* 🟢 FIXED: height now exactly 25% of widget ≈ 85px – super compact */
            max-height: 94px;              /* 94px ~ 1/4 of widget; enough for ~3 devices */
            overflow-y: auto;
        }

        /* ultra slim scrollbar */
        #device-menu::-webkit-scrollbar {
            width: 4px;
        }
        #device-menu::-webkit-scrollbar-track {
            background: #2a2a2a;
            border-radius: 8px;
        }
        #device-menu::-webkit-scrollbar-thumb {
            background: #5f5f5f;
            border-radius: 8px;
        }

        .device-option {
            padding: 8px 14px;
            font-size: 0.75rem;
            cursor: pointer;
            background: transparent;
            border: none;
            color: #d9d9d9;
            text-align: left;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.1s, color 0.1s;
            border-left: 3px solid transparent;
            font-weight: 450;
            line-height: 1.2;
        }
        .device-option:hover {
            background: #2e2e2e;
            color: white;
            border-left-color: var(--sp-green);
        }
        .active-device {
            color: var(--sp-green);
            font-weight: 600;
            background: rgba(29,185,84,0.05);
        }
        .active-device span:last-child {
            font-size: 1rem;
            color: var(--sp-green);
        }

        /* progress + time row */
        #progress-container {
            width: 100%;
            height: 5px;
            background: #4a4a4a;
            border-radius: 20px;
            cursor: pointer;
            margin: 2px 0 4px 0;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: #ffffff;
            border-radius: 20px;
            transition: width 0.1s ease;
            box-shadow: 0 0 5px rgba(255,255,255,0.3);
        }

        /* bottom row */
        .bottom-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-nav {
            background: none;
            border: none;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 1.3rem;
            transition: color 0.1s, transform 0.1s;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .btn-nav:hover {
            color: white;
            background: rgba(255,255,255,0.08);
            transform: scale(1.1);
        }

        #play-btn {
            background: white;
            color: #121212;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #play-btn:hover {
            transform: scale(1.07);
            box-shadow: 0 8px 18px rgba(0,0,0,0.6);
        }

        #time-display {
            font-size: 0.7rem;
            color: #aaa;
            background: rgba(0,0,0,0.4);
            padding: 3px 10px;
            border-radius: 40px;
            letter-spacing: 0.3px;
            font-variant-numeric: tabular-nums;
            border: 1px solid #3b3b3b;
        }
    </style>
</head>
<body>
    <div id="player-container">
        <div class="top-row">
            <div id="album-art"></div>
            <div class="meta">
                <p id="track-name">Paused</p>
                <p id="artist-name">Ready</p>
            </div>
            <button id="device-btn" onclick="toggleDevices()" title="Devices">🔊</button>
            <div id="device-menu"></div>
        </div>

        <!-- progress (click to seek) -->
        <div id="progress-container" onclick="seekFromProgress(event)">
            <div id="progress-bar"></div>
        </div>

        <div class="bottom-row">
            <div class="controls">
                <button class="btn-nav" onclick="player.previousTrack()" title="Previous">⏮</button>
                <button class="btn-nav" onclick="player.nextTrack()" title="Next">⏭</button>
                <span id="time-display">0:00</span>
            </div>
            <button id="play-btn" onclick="player.togglePlay()" title="Play/Pause">▶</button>
        </div>
    </div>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script>
        (function() {
            const clientId = 'ccb3b4e6e11b48fc9ba11bc154e65534';   // from original
            const accessToken = localStorage.getItem('access_token');
            if (!accessToken) {
                document.getElementById('track-name').innerText = '⚠️ token missing';
                document.getElementById('artist-name').innerText = 're-login';
            }

            // Global references
            let player = null;
            window.player = null;      // will be assigned

            // active device tracking for UI sync
            let activeDeviceId = null;

            // --- TRANSFER PLAYBACK + ENSURE FULL SYNC ---
            async function transferPlayback(deviceId) {
                try {
                    // According to Spotify Web API: PUT /me/player with play:true transfers and starts playback
                    const response = await fetch('https://api.spotify.com/v1/me/player', {
                        method: 'PUT',
                        body: JSON.stringify({ device_ids: [deviceId], play: true }),
                        headers: { 
                            'Content-Type': 'application/json', 
                            'Authorization': `Bearer ${accessToken}` 
                        }
                    });
                    
                    if (response.status === 204 || response.ok) {
                        // success → update active device locally (will be refreshed via next device poll)
                        activeDeviceId = deviceId;
                        document.getElementById('device-menu').style.display = 'none';

                        // 🟢 additional sync: ask player state to refresh (if SDK connected)
                        if (player) {
                            // small delay to let backend register transfer
                            setTimeout(() => {
                                player.getCurrentState().then(state => {
                                    if (state) console.log('playback synced after transfer');
                                }).catch(() => {});
                            }, 300);
                        }

                        // also immediately refetch devices to reflect active (optional)
                        refreshDeviceListUI();   // defined later
                    } else {
                        console.warn('transfer failed with status', response.status);
                    }
                } catch (e) {
                    console.error('transfer error', e);
                }
            }

            // --- fetch devices and update menu (with active highlighting) ---
            async function refreshDeviceListUI() {
                const menu = document.getElementById('device-menu');
                if (menu.style.display !== 'flex') return; // only refresh if open? we keep it separate

                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player/devices', {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                    if (!res.ok) return;
                    const data = await res.json();
                    
                    // update active device id
                    const activeDev = data.devices.find(d => d.is_active);
                    if (activeDev) activeDeviceId = activeDev.id;

                    // rebuild menu
                    menu.innerHTML = '';
                    if (!data.devices || data.devices.length === 0) {
                        const emptyMsg = document.createElement('div');
                        emptyMsg.className = 'device-option';
                        emptyMsg.innerText = '✖ no devices found';
                        emptyMsg.style.opacity = '0.6';
                        emptyMsg.style.cursor = 'default';
                        menu.appendChild(emptyMsg);
                    } else {
                        data.devices.forEach(d => {
                            const item = document.createElement('button');
                            const isActive = d.is_active || (d.id === activeDeviceId); // extra fallback
                            item.className = `device-option ${isActive ? 'active-device' : ''}`;
                            
                            // device display: name + type compact
                            let deviceTypeIcon = '';
                            if (d.type === 'Computer') deviceTypeIcon = '💻';
                            else if (d.type === 'Smartphone') deviceTypeIcon = '📱';
                            else if (d.type === 'Speaker') deviceTypeIcon = '🔊';
                            else deviceTypeIcon = '🎧';
                            
                            item.innerHTML = `<span>${deviceTypeIcon} ${d.name}</span> 
                                            <span>${isActive ? '●' : ''}</span>`;
                            
                            item.onclick = (e) => {
                                e.stopPropagation();
                                transferPlayback(d.id);
                                // menu will be hidden after transfer (inside transferPlayback)
                            };
                            menu.appendChild(item);
                        });
                    }
                } catch (err) {
                    console.warn('device refresh err', err);
                }
            }

            // toggle device menu: make it super compact + refresh content
            window.toggleDevices = async function() {
                const menu = document.getElementById('device-menu');
                
                if (menu.style.display === 'flex') {
                    menu.style.display = 'none';
                    return;
                }

                // load devices and show
                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player/devices', {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                    if (!res.ok) throw new Error('fetch failed');
                    const data = await res.json();

                    // update active id
                    const activeDev = data.devices.find(d => d.is_active);
                    if (activeDev) activeDeviceId = activeDev.id;

                    menu.innerHTML = '';
                    if (!data.devices || data.devices.length === 0) {
                        menu.innerHTML = '<div class="device-option" style="cursor:default">📡 no active devices</div>';
                    } else {
                        data.devices.forEach(d => {
                            const item = document.createElement('button');
                            const isActive = d.is_active || (d.id === activeDeviceId);
                            item.className = `device-option ${isActive ? 'active-device' : ''}`;
                            
                            let icon = '🔹';
                            if (d.type === 'Computer') icon = '💻';
                            else if (d.type === 'Smartphone') icon = '📱';
                            else if (d.type === 'Speaker') icon = '🔊';
                            
                            item.innerHTML = `<span>${icon} ${d.name}</span> 
                                            <span>${isActive ? '●' : ''}</span>`;
                            
                            item.onclick = (e) => {
                                e.stopPropagation();
                                transferPlayback(d.id);
                                menu.style.display = 'none';
                            };
                            menu.appendChild(item);
                        });
                    }
                } catch (err) {
                    menu.innerHTML = '<div class="device-option">⚠️ error</div>';
                }

                menu.style.display = 'flex';
            };

            // seek from progress click
            window.seekFromProgress = function(event) {
                if (!player) return;
                const container = document.getElementById('progress-container');
                const rect = container.getBoundingClientRect();
                const clickX = event.clientX - rect.left;
                const width = rect.width;
                const seekRatio = Math.min(1, Math.max(0, clickX / width));
                
                player.getCurrentState().then(state => {
                    if (state && state.duration) {
                        const positionMs = Math.floor(seekRatio * state.duration);
                        player.seek(positionMs);
                    }
                }).catch(() => {});
            };

            // close menu if click outside
            document.addEventListener('click', function(event) {
                const menu = document.getElementById('device-menu');
                const btn = document.getElementById('device-btn');
                if (menu.style.display === 'flex' && !menu.contains(event.target) && !btn.contains(event.target)) {
                    menu.style.display = 'none';
                }
            });

            // --- SPOTIFY SDK INIT ---
            window.onSpotifyWebPlaybackSDKReady = () => {
                if (!accessToken) return;

                const sdkPlayer = new Spotify.Player({
                    name: 'Compact Dashboard',
                    getOAuthToken: cb => cb(accessToken),
                    volume: 0.8
                });

                window.player = sdkPlayer;
                player = sdkPlayer; // local alias

                // ready event: we could capture device id
                sdkPlayer.addListener('ready', ({ device_id }) => {
                    console.log('SDK device ID:', device_id);
                    // Optionally refresh device list after ready
                });

                // 🟢 CRITICAL: reflect device changes & keep UI synced
                sdkPlayer.addListener('player_state_changed', state => {
                    if (!state) {
                        // No state, but maybe still need to reset UI
                        document.getElementById('track-name').innerText = 'No playback';
                        document.getElementById('artist-name').innerText = '';
                        document.getElementById('album-art').style.backgroundImage = '';
                        document.getElementById('play-btn').innerText = '▶';
                        document.getElementById('progress-bar').style.width = '0%';
                        document.getElementById('time-display').innerText = '0:00';
                        return;
                    }

                    const track = state.track_window.current_track;
                    if (track) {
                        document.getElementById('track-name').innerText = track.name;
                        const artistName = (track.artists && track.artists[0]) ? track.artists[0].name : '';
                        document.getElementById('artist-name').innerText = artistName;
                        if (track.album && track.album.images && track.album.images[0]) {
                            document.getElementById('album-art').style.backgroundImage = `url(${track.album.images[0].url})`;
                        }
                    }

                    document.getElementById('play-btn').innerText = state.paused ? '▶' : '⏸';

                    // time + progress
                    if (state.duration > 0) {
                        const percent = (state.position / state.duration) * 100;
                        document.getElementById('progress-bar').style.width = percent + '%';

                        const posMin = Math.floor(state.position / 60000);
                        const posSec = Math.floor((state.position % 60000) / 1000);
                        const durMin = Math.floor(state.duration / 60000);
                        const durSec = Math.floor((state.duration % 60000) / 1000);
                        document.getElementById('time-display').innerText = 
                            `${posMin}:${posSec.toString().padStart(2,'0')} / ${durMin}:${durSec.toString().padStart(2,'0')}`;
                    }
                });

                // also listen for autoplay_failed? not needed

                sdkPlayer.connect();

                // additional: poll device info every 30s to keep active dot accurate (optional)
                setInterval(() => {
                    if (document.getElementById('device-menu').style.display === 'flex') {
                        refreshDeviceListUI();
                    }
                }, 5000); // every 5 sec only when menu open – efficient
            };

            // manual device list refresh for open menu
            async function refreshDeviceListUI() {
                const menu = document.getElementById('device-menu');
                if (menu.style.display !== 'flex') return;
                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player/devices', {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                    const data = await res.json();
                    const activeDev = data.devices.find(d => d.is_active);
                    if (activeDev) activeDeviceId = activeDev.id;

                    // rebuild children preserving order but updating active class
                    const items = menu.querySelectorAll('.device-option');
                    // simple approach: recreate – but we'll keep it light
                    // we just update class names based on current activeDeviceId
                    data.devices.forEach(d => {
                        // find corresponding button (by name? might duplicate)
                        // easier: rebuild every time when menu open? already done in toggle
                        // but for background sync we just leave it, user can reopen
                    });
                } catch (e) {}
            }

            if (!accessToken) {
                console.warn('no token – UI in demo mode');
            }
        })();
    </script>
</body>
</html>
