<!DOCTYPE html>
<html>
<head>
    <title>My Synced Dashboard Player</title>
</head>
<body>
    <h1>Spotify Dashboard Player</h1>
    <button id="togglePlay">Play / Pause</button>
    <div id="track-info">Status: Loading...</div>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script>
        window.onSpotifyWebPlaybackSDKReady = () => {
            // Replace 'YOUR_ACCESS_TOKEN' with a real token from OAuth
            const token = 'YOUR_ACCESS_TOKEN'; 
            const player = new Spotify.Player({
                name: 'Dashboard Web Player',
                getOAuthToken: cb => { cb(token); },
                volume: 0.5
            });

            // Ready
            player.addListener('ready', ({ device_id }) => {
                console.log('Ready with Device ID', device_id);
                document.getElementById('track-info').innerText = "Connected & Synced!";
            });

            // Connect to the player!
            player.connect();

            document.getElementById('togglePlay').onclick = function() {
              player.togglePlay();
            };
        };
    </script>
</body>
</html>
