<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Pro • fixed device control</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --sp-green: #1DB954;
            --bg-card: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --cover-size: 56px;
        }

        body {
            background: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            color: var(--text-main);
        }

        #player-container {
            background: #191919;
            width: 340px;
            padding: 16px;
            border-radius: 28px;
            border: 1px solid #2a2a2a;
            box-shadow: 0 25px 50px -8px black;
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* top row */
        .top-row {
            display: flex;
            gap: 12px;
            align-items: center;
            position: relative;
        }

        #album-art {
            width: var(--cover-size);
            height: var(--cover-size);
            border-radius: 10px;
            background: #222;
            background-size: cover;
            background-position: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            flex-shrink: 0;
        }

        .meta {
            flex: 1;
            min-width: 0;
        }

        #track-name {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        #artist-name {
            font-size: 0.75rem;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* device button */
        #device-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: #ccc;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
            flex-shrink: 0;
        }
        #device-btn:hover {
            background: rgba(255,255,255,0.15);
            color: white;
            transform: scale(1.03);
        }

        /* device menu – compact height */
        #device-menu {
            position: absolute;
            bottom: 42px;
            right: -2px;
            width: 240px;
            background: #1e1e1e;
            border: 1px solid #3b3b3b;
            border-radius: 20px;
            padding: 6px 0;
            display: none;
            flex-direction: column;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
            z-index: 200;
            max-height: 120px;
            overflow-y: auto;
            backdrop-filter: blur(12px);
            background: rgba(25,25,25,0.98);
        }

        #device-menu::-webkit-scrollbar {
            width: 4px;
        }
        #device-menu::-webkit-scrollbar-thumb {
            background: #4f4f4f;
            border-radius: 20px;
        }

        .device-option {
            padding: 10px 16px;
            font-size: 0.8rem;
            background: transparent;
            border: none;
            color: #e0e0e0;
            width: 100%;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: 0.1s;
        }
        .device-option:hover {
            background: #2d2d2d;
            border-left-color: var(--sp-green);
        }
        .active-device {
            color: var(--sp-green);
            font-weight: 600;
            background: rgba(29,185,84,0.1);
        }

        /* progress */
        #progress-container {
            width: 100%;
            height: 5px;
            background: #3a3a3a;
            border-radius: 10px;
            cursor: pointer;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: white;
            border-radius: 10px;
            transition: width 0.1s;
        }

        /* bottom row */
        .bottom-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-nav {
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 1.4rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
        }
        .btn-nav:hover {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        #play-btn {
            background: white;
            color: black;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,0,0,0.5);
            transition: 0.15s;
        }
        #play-btn:hover {
            transform: scale(1.07);
        }

        #time-display {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.5);
            padding: 4px 10px;
            border-radius: 30px;
            border: 1px solid #333;
            font-variant-numeric: tabular-nums;
            color: #ccc;
        }

        /* active device indicator */
        #active-device-indicator {
            font-size: 0.65rem;
            color: #1DB954;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #1DB954;
            display: inline-block;
            box-shadow: 0 0 6px #1DB954;
        }

        .error-message {
            color: #f15e6c;
            font-size: 0.7rem;
            padding: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="player-container">
        <div class="top-row">
            <div id="album-art"></div>
            <div class="meta">
                <p id="track-name">Spotify</p>
                <p id="artist-name">widget ready</p>
                <div id="active-device-indicator"><span class="dot"></span> <span id="active-device-name">no device</span></div>
            </div>
            <button id="device-btn" onclick="toggleDevices()">🔊</button>
            <div id="device-menu"></div>
        </div>

        <div id="progress-container" onclick="seekFromProgress(event)">
            <div id="progress-bar"></div>
        </div>

        <div class="bottom-row">
            <div class="controls">
                <button class="btn-nav" onclick="handlePrev()" title="Previous">⏮</button>
                <button class="btn-nav" onclick="handleNext()" title="Next">⏭</button>
                <span id="time-display">0:00</span>
            </div>
            <button id="play-btn" onclick="handlePlayPause()" title="Play/Pause">▶</button>
        </div>
    </div>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script>
        (function() {
            // --------------------------------------------------------------
            // TOKEN – stored in localStorage
            const accessToken = localStorage.getItem('access_token');
            if (!accessToken) {
                document.getElementById('track-name').innerText = '⚠️ token missing';
                document.getElementById('artist-name').innerText = 're-login';
            }

            // Core state
            let player = null;
            window.player = null;
            let lastState = null;
            let currentSdkDeviceId = null;

            // UI elements
            const trackEl = document.getElementById('track-name');
            const artistEl = document.getElementById('artist-name');
            const albumEl = document.getElementById('album-art');
            const playBtn = document.getElementById('play-btn');
            const progressBar = document.getElementById('progress-bar');
            const timeEl = document.getElementById('time-display');
            const activeDeviceNameEl = document.getElementById('active-device-name');
            const deviceMenu = document.getElementById('device-menu');
            const deviceBtn = document.getElementById('device-btn');

            // ---------- HELPER: Spotify API fetch with better error handling ----------
            async function spotifyFetch(endpoint, method = 'GET', body = null, queryParams = null) {
                let url = `https://api.spotify.com/v1/${endpoint}`;
                
                // Add query parameters if provided
                if (queryParams) {
                    const params = new URLSearchParams(queryParams);
                    url += `?${params.toString()}`;
                }

                const options = {
                    method,
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    }
                };

                if (body) {
                    options.body = JSON.stringify(body);
                }

                try {
                    const res = await fetch(url, options);
                    if (res.status === 401) {
                        console.error('Token expired');
                        trackEl.innerText = '⚠️ token expired';
                    }
                    return res;
                } catch (error) {
                    console.error('Fetch error:', error);
                    return { ok: false, status: 0 };
                }
            }

            // ---------- DEVICE MANAGEMENT (FIXED) ----------
            async function getAvailableDevices() {
                try {
                    const res = await spotifyFetch('me/player/devices');
                    if (!res.ok) {
                        console.error('Failed to fetch devices:', res.status);
                        return [];
                    }
                    const data = await res.json();
                    return data.devices || [];
                } catch (error) {
                    console.error('Error fetching devices:', error);
                    return [];
                }
            }

            async function transferPlayback(deviceId) {
                try {
                    // First, try to transfer playback
                    const res = await spotifyFetch('me/player', 'PUT', {
                        device_ids: [deviceId],
                        play: true
                    });
                    
                    if (res.ok || res.status === 204) {
                        console.log('Transfer successful to device:', deviceId);
                        
                        // Update the active device name
                        const devices = await getAvailableDevices();
                        const transferredDevice = devices.find(d => d.id === deviceId);
                        if (transferredDevice) {
                            activeDeviceNameEl.innerText = transferredDevice.name;
                        }
                        
                        // Wait a moment for the transfer to complete, then refresh state
                        setTimeout(() => {
                            refreshPlaybackState();
                        }, 500);
                        
                        return true;
                    } else {
                        console.error('Transfer failed:', res.status);
                        return false;
                    }
                } catch (error) {
                    console.error('Transfer error:', error);
                    return false;
                }
            }

            // ---------- DEVICE MENU POPULATION (FIXED) ----------
            async function populateDeviceMenu() {
                if (!accessToken) {
                    deviceMenu.innerHTML = '<div class="device-option error-message">No access token</div>';
                    return;
                }

                const devices = await getAvailableDevices();
                
                if (!devices || devices.length === 0) {
                    deviceMenu.innerHTML = '<div class="device-option" style="cursor:default; color:#999;">📡 No devices available</div>' +
                                          '<div class="device-option" style="cursor:default; font-size:0.7rem; color:#666;">Open Spotify on any device</div>';
                    return;
                }

                deviceMenu.innerHTML = '';
                
                devices.forEach(device => {
                    const item = document.createElement('button');
                    const isActive = device.is_active;
                    
                    item.className = `device-option ${isActive ? 'active-device' : ''}`;
                    
                    // Choose icon based on device type
                    let icon = '🔹';
                    const type = device.type?.toLowerCase() || '';
                    if (type.includes('computer')) icon = '💻';
                    else if (type.includes('smartphone') || type.includes('phone')) icon = '📱';
                    else if (type.includes('speaker')) icon = '🔊';
                    else if (type.includes('tv')) icon = '📺';
                    else if (type.includes('tablet')) icon = '📱';
                    else if (type.includes('audio')) icon = '🎧';

                    item.innerHTML = `<span>${icon} ${device.name}</span> 
                                    <span>${isActive ? '●' : ''}</span>`;
                    
                    item.onclick = async (e) => {
                        e.stopPropagation();
                        e.preventDefault();
                        
                        // Show feedback
                        item.style.opacity = '0.7';
                        
                        const success = await transferPlayback(device.id);
                        
                        if (success) {
                            deviceMenu.style.display = 'none';
                        } else {
                            // Show error briefly
                            const originalText = item.innerHTML;
                            item.innerHTML = '<span>⚠️ Transfer failed</span>';
                            item.style.opacity = '1';
                            setTimeout(() => {
                                item.innerHTML = originalText;
                            }, 1500);
                        }
                    };
                    
                    deviceMenu.appendChild(item);
                });
            }

            window.toggleDevices = async () => {
                if (deviceMenu.style.display === 'flex') {
                    deviceMenu.style.display = 'none';
                    return;
                }
                
                // Show loading state
                deviceMenu.innerHTML = '<div class="device-option" style="justify-content:center;">Loading devices...</div>';
                deviceMenu.style.display = 'flex';
                
                await populateDeviceMenu();
            };

            // Close menu on outside click
            document.addEventListener('click', (e) => {
                if (deviceMenu.style.display === 'flex' && 
                    !deviceMenu.contains(e.target) && 
                    e.target !== deviceBtn) {
                    deviceMenu.style.display = 'none';
                }
            });

            // ---------- PLAYBACK CONTROL (REST API) ----------
            window.handlePlayPause = async () => {
                try {
                    const res = await spotifyFetch('me/player');
                    if (res.status === 204 || !res.ok) {
                        // No active device - try to use SDK if available
                        if (player) {
                            player.togglePlay();
                        }
                        return;
                    }
                    
                    const data = await res.json();
                    if (data.is_playing) {
                        await spotifyFetch('me/player/pause', 'PUT');
                    } else {
                        await spotifyFetch('me/player/play', 'PUT');
                    }
                    
                    // Refresh state after action
                    setTimeout(refreshPlaybackState, 200);
                } catch (error) {
                    console.error('Play/pause error:', error);
                    if (player) player.togglePlay();
                }
            };

            window.handleNext = async () => {
                await spotifyFetch('me/player/next', 'POST');
                setTimeout(refreshPlaybackState, 300);
            };

            window.handlePrev = async () => {
                await spotifyFetch('me/player/previous', 'POST');
                setTimeout(refreshPlaybackState, 300);
            };

            window.seekFromProgress = async (event) => {
                const container = document.getElementById('progress-container');
                const rect = container.getBoundingClientRect();
                const ratio = Math.min(1, Math.max(0, (event.clientX - rect.left) / rect.width));
                
                try {
                    // Get current playback state to know duration
                    const res = await spotifyFetch('me/player');
                    if (res.ok) {
                        const data = await res.json();
                        if (data.item && data.item.duration_ms) {
                            const positionMs = Math.floor(ratio * data.item.duration_ms);
                            await spotifyFetch(`me/player/seek?position_ms=${positionMs}`, 'PUT');
                            setTimeout(refreshPlaybackState, 200);
                        }
                    }
                } catch (error) {
                    console.error('Seek error:', error);
                }
            };

            // ---------- REFRESH PLAYBACK STATE (REST API) ----------
            async function refreshPlaybackState() {
                if (!accessToken) return;
                
                try {
                    const res = await spotifyFetch('me/player');
                    
                    if (res.status === 204 || !res.ok) {
                        // No active playback
                        trackEl.innerText = 'No active device';
                        artistEl.innerText = 'Open Spotify and play something';
                        albumEl.style.backgroundImage = '';
                        playBtn.innerText = '▶';
                        progressBar.style.width = '0%';
                        timeEl.innerText = '0:00';
                        activeDeviceNameEl.innerText = 'none';
                        return;
                    }
                    
                    const state = await res.json();
                    
                    // Update track info
                    if (state.item) {
                        trackEl.innerText = state.item.name;
                        artistEl.innerText = state.item.artists.map(a => a.name).join(', ');
                        
                        if (state.item.album?.images?.[0]?.url) {
                            albumEl.style.backgroundImage = `url(${state.item.album.images[0].url})`;
                        }
                    }
                    
                    // Update play button
                    playBtn.innerText = state.is_playing ? '⏸' : '▶';
                    
                    // Update progress
                    if (state.item?.duration_ms) {
                        const pos = state.progress_ms || 0;
                        const dur = state.item.duration_ms;
                        const percent = (pos / dur) * 100;
                        progressBar.style.width = percent + '%';
                        
                        const posMin = Math.floor(pos / 60000);
                        const posSec = Math.floor((pos % 60000) / 1000);
                        const durMin = Math.floor(dur / 60000);
                        const durSec = Math.floor((dur % 60000) / 1000);
                        timeEl.innerText = `${posMin}:${posSec.toString().padStart(2,'0')} / ${durMin}:${durSec.toString().padStart(2,'0')}`;
                    }
                    
                    // Update active device name
                    if (state.device) {
                        activeDeviceNameEl.innerText = state.device.name;
                    }
                    
                } catch (error) {
                    console.error('Refresh error:', error);
                }
            }

            // ---------- SPOTIFY SDK (for events, but REST for control) ----------
            window.onSpotifyWebPlaybackSDKReady = () => {
                if (!accessToken) return;

                const sdkPlayer = new Spotify.Player({
                    name: 'Compact Controller',
                    getOAuthToken: cb => cb(accessToken),
                    volume: 0.8
                });

                sdkPlayer.addListener('ready', ({ device_id }) => {
                    console.log('SDK ready, id =', device_id);
                    currentSdkDeviceId = device_id;
                    refreshPlaybackState();
                });

                sdkPlayer.addListener('player_state_changed', state => {
                    if (state) {
                        lastState = state;
                        // Use SDK for instant UI updates
                        const track = state.track_window.current_track;
                        if (track) {
                            trackEl.innerText = track.name;
                            artistEl.innerText = track.artists.map(a => a.name).join(', ');
                            if (track.album.images[0]) {
                                albumEl.style.backgroundImage = `url(${track.album.images[0].url})`;
                            }
                        }
                        playBtn.innerText = state.paused ? '▶' : '⏸';
                        
                        if (state.duration > 0) {
                            const percent = (state.position / state.duration) * 100;
                            progressBar.style.width = percent + '%';
                            
                            const posMin = Math.floor(state.position / 60000);
                            const posSec = Math.floor((state.position % 60000) / 1000);
                            const durMin = Math.floor(state.duration / 60000);
                            const durSec = Math.floor((state.duration % 60000) / 1000);
                            timeEl.innerText = `${posMin}:${posSec.toString().padStart(2,'0')} / ${durMin}:${durSec.toString().padStart(2,'0')}`;
                        }
                    }
                });

                sdkPlayer.addListener('authentication_error', ({ message }) => {
                    console.error('SDK auth error:', message);
                });

                sdkPlayer.connect();
                window.player = sdkPlayer;
            };

            // Poll for updates (every 3 seconds)
            if (accessToken) {
                refreshPlaybackState();
                setInterval(refreshPlaybackState, 3000);
            }
        })();
    </script>
</body>
</html>
