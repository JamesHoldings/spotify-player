<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Compact Pro – fixed & scrollable</title>
    <style>
        /* ----- modern reset / variables ----- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --sp-green: #1DB954;
            --bg-grey: #282828;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --widget-width: 360px;
            --cover-size: 64px;
            --transition: 0.15s ease;
        }

        body {
            background: transparent;
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #player-container {
            background: var(--bg-grey);
            width: var(--widget-width);
            padding: 16px 16px 14px 16px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.7);
            position: relative;
            backdrop-filter: blur(2px);
            border: 1px solid #3e3e3e;
        }

        /* ----- top row : album art + meta + device trigger ----- */
        .top-row {
            display: flex;
            gap: 14px;
            align-items: center;
            position: relative;  /* anchor for device menu */
        }

        #album-art {
            width: var(--cover-size);
            height: var(--cover-size);
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            background-color: #181818;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .meta {
            flex-grow: 1;
            overflow: hidden;
            min-width: 0;       /* helps text ellipsis */
        }

        #track-name {
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.2px;
        }

        #artist-name {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ----- device button + menu (IMPROVED: scrollable & half height) ----- */
        #device-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: #ddd;
            cursor: pointer;
            font-size: 1.5rem;
            line-height: 1;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition), color var(--transition);
            flex-shrink: 0;
        }
        #device-btn:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        /* menu panel – now scrollable & exactly half the widget height (widget ~356px high → half ≈ 178px) */
        #device-menu {
            position: absolute;
            bottom: 45px;          /* sits nicely above the bottom row */
            right: 0;
            background: #1e1e1e;
            border-radius: 16px;
            width: 240px;
            display: none;
            flex-direction: column;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
            z-index: 200;
            padding: 8px 0;
            border: 1px solid #4a4a4a;
            backdrop-filter: blur(4px);
            background: rgba(30,30,30,0.98);

            /* 🎯 FIX: height limited to half of player container (approx) */
            max-height: 170px;      /* slightly less than half for visual comfort */
            overflow-y: auto;
        }

        /* ultra slim scrollbar for device list */
        #device-menu::-webkit-scrollbar {
            width: 4px;
        }
        #device-menu::-webkit-scrollbar-track {
            background: transparent;
        }
        #device-menu::-webkit-scrollbar-thumb {
            background: #5a5a5a;
            border-radius: 20px;
        }

        .device-option {
            padding: 10px 16px;
            font-size: 0.8rem;
            cursor: pointer;
            background: transparent;
            border: none;
            color: var(--text-dim);
            text-align: left;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.1s, color 0.1s;
            border-left: 3px solid transparent;
            font-weight: 500;
        }
        .device-option:hover {
            background: #2a2a2a;
            color: white;
            border-left-color: var(--sp-green);
        }
        .active-device {
            color: var(--sp-green);
            font-weight: 600;
        }
        .active-device span:last-child {
            font-size: 1.2rem;
            line-height: 1;
        }

        /* progress bar */
        #progress-container {
            width: 100%;
            height: 5px;
            background: #4d4d4d;
            border-radius: 20px;
            cursor: pointer;
            transition: height 0.1s;
        }
        #progress-container:hover {
            height: 7px;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--text-main);
            border-radius: 20px;
            transition: width 0.1s linear;
        }

        /* bottom controls */
        .bottom-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 4px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .btn-nav {
            background: none;
            border: none;
            color: #e5e5e5;
            cursor: pointer;
            font-size: 1.4rem;
            transition: color 0.1s, transform 0.1s;
            line-height: 1;
        }
        .btn-nav:hover {
            color: white;
            transform: scale(1.1);
        }

        #play-btn {
            background: white;
            color: #181818;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        #play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 14px rgba(0,0,0,0.6);
        }

        #time-display {
            font-size: 0.8rem;
            color: var(--text-dim);
            background: rgba(0,0,0,0.3);
            padding: 2px 10px;
            border-radius: 30px;
            letter-spacing: 0.5px;
        }

        /* small extra: hidden scrollbar hint */
        .device-option:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div id="player-container">
        <div class="top-row">
            <div id="album-art"></div>
            <div class="meta">
                <p id="track-name">Paused</p>
                <p id="artist-name">Ready</p>
            </div>
            <button id="device-btn" onclick="toggleDevices()" title="Available devices">📱</button>
            <!-- device menu injected here -->
            <div id="device-menu"></div>
        </div>

        <!-- clickable progress bar (optional improvement) -->
        <div id="progress-container" onclick="seekFromProgress(event)">
            <div id="progress-bar"></div>
        </div>

        <div class="bottom-row">
            <div class="controls">
                <button class="btn-nav" onclick="player.previousTrack()" title="Previous">⏮</button>
                <button class="btn-nav" onclick="player.nextTrack()" title="Next">⏭</button>
                <span id="time-display">0:00</span>
            </div>
            <button id="play-btn" onclick="player.togglePlay()" title="Play/Pause">▶</button>
        </div>
    </div>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script>
        (function() {
            // ----- CONFIG -----
            const clientId = 'ccb3b4e6e11b48fc9ba11bc154e65534';   // (kept from original)
            const accessToken = localStorage.getItem('access_token');
            if (!accessToken) {
                alert('⚠️ No access token found. Please login via Spotify (token missing).');
            }

            // global player reference
            window.player = null;   // will be assigned later, but we attach to window for onclick

            // ----- helper: transfer playback (improved with error log) -----
            async function transferPlayback(deviceId) {
                try {
                    const response = await fetch('https://api.spotify.com/v1/me/player', {
                        method: 'PUT',
                        body: JSON.stringify({ device_ids: [deviceId], play: true }),
                        headers: { 
                            'Content-Type': 'application/json', 
                            'Authorization': `Bearer ${accessToken}` 
                        }
                    });
                    if (!response.ok) {
                        console.warn('transfer response not OK:', response.status);
                    } else {
                        // close menu after successful transfer
                        document.getElementById('device-menu').style.display = 'none';
                    }
                } catch (e) {
                    console.error('transfer failed', e);
                }
            }

            // ----- toggle device list (fully scrollable, half height) -----
            window.toggleDevices = async function() {
                const menu = document.getElementById('device-menu');
                
                // if menu visible → hide and exit
                if (menu.style.display === 'flex') {
                    menu.style.display = 'none';
                    return;
                }

                // load devices
                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player/devices', {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    
                    menu.innerHTML = '';   // clear old list
                    if (!data.devices || data.devices.length === 0) {
                        const emptyMsg = document.createElement('div');
                        emptyMsg.className = 'device-option';
                        emptyMsg.innerText = 'no devices found';
                        emptyMsg.style.opacity = '0.6';
                        emptyMsg.style.cursor = 'default';
                        menu.appendChild(emptyMsg);
                    } else {
                        data.devices.forEach(d => {
                            const item = document.createElement('button');
                            item.className = `device-option ${d.is_active ? 'active-device' : ''}`;
                            // show device name + active indicator
                            item.innerHTML = `<span>${d.name} ${d.type ? '· '+d.type : ''}</span> 
                                            <span>${d.is_active ? '●' : ''}</span>`;
                            // on click, transfer and close menu
                            item.onclick = (e) => {
                                e.stopPropagation();
                                transferPlayback(d.id);
                                menu.style.display = 'none';  // ensure hide
                            };
                            menu.appendChild(item);
                        });
                    }
                } catch (err) {
                    console.error('device fetch error', err);
                    menu.innerHTML = '<div class="device-option">⚠️ error loading</div>';
                }

                // show menu
                menu.style.display = 'flex';
            };

            // optional seek (improvement) – uses global player
            window.seekFromProgress = function(event) {
                if (!player) return;
                const container = document.getElementById('progress-container');
                const rect = container.getBoundingClientRect();
                const clickX = event.clientX - rect.left;
                const width = rect.width;
                let seekRatio = Math.min(1, Math.max(0, clickX / width));
                
                // get current state to know duration
                player.getCurrentState().then(state => {
                    if (state && state.duration) {
                        const positionMs = Math.floor(seekRatio * state.duration);
                        player.seek(positionMs);
                    }
                }).catch(() => {});
            };

            // ----- spotify SDK setup -----
            window.onSpotifyWebPlaybackSDKReady = () => {
                if (!accessToken) return;
                
                const sdkPlayer = new Spotify.Player({
                    name: 'Compact Pro Widget',
                    getOAuthToken: cb => { cb(accessToken); },
                    volume: 0.8
                });

                // attach to global so onclick works
                window.player = sdkPlayer;

                // error handling
                sdkPlayer.addListener('initialization_error', ({ message }) => console.error('init error', message));
                sdkPlayer.addListener('authentication_error', ({ message }) => console.error('auth error', message));
                sdkPlayer.addListener('account_error', ({ message }) => console.error('account error', message));

                // ready
                sdkPlayer.addListener('ready', ({ device_id }) => {
                    console.log('SDK ready with device id', device_id);
                    // optional: auto-transfer to this device? original didn't, we keep same behavior.
                });

                // player state changed
                sdkPlayer.addListener('player_state_changed', state => {
                    if (!state) {
                        // idle: reset display
                        document.getElementById('track-name').innerText = 'No active playback';
                        document.getElementById('artist-name').innerText = '—';
                        document.getElementById('album-art').style.backgroundImage = 'none';
                        document.getElementById('play-btn').innerText = '▶';
                        document.getElementById('progress-bar').style.width = '0%';
                        document.getElementById('time-display').innerText = '0:00';
                        return;
                    }

                    const track = state.track_window.current_track;
                    if (track) {
                        document.getElementById('track-name').innerText = track.name || 'unknown';
                        const artist = (track.artists && track.artists[0]) ? track.artists[0].name : 'unknown';
                        document.getElementById('artist-name').innerText = artist;
                        if (track.album && track.album.images && track.album.images[0]) {
                            document.getElementById('album-art').style.backgroundImage = `url(${track.album.images[0].url})`;
                        } else {
                            document.getElementById('album-art').style.backgroundImage = 'none';
                        }
                    }

                    // play/pause button
                    document.getElementById('play-btn').innerText = state.paused ? '▶' : '⏸';

                    // progress + time display
                    if (state.duration > 0) {
                        const progressPercent = (state.position / state.duration) * 100;
                        document.getElementById('progress-bar').style.width = progressPercent + '%';

                        const posMin = Math.floor(state.position / 60000);
                        const posSec = Math.floor((state.position % 60000) / 1000);
                        const durMin = Math.floor(state.duration / 60000);
                        const durSec = Math.floor((state.duration % 60000) / 1000);
                        document.getElementById('time-display').innerText = 
                            `${posMin}:${posSec.toString().padStart(2,'0')} / ${durMin}:${durSec.toString().padStart(2,'0')}`;
                    } else {
                        document.getElementById('time-display').innerText = '0:00';
                    }
                });

                sdkPlayer.connect();
            };

            // if token is missing, display placeholder but keep ui friendly
            if (!accessToken) {
                document.getElementById('track-name').innerText = '⚠️ no token';
                document.getElementById('artist-name').innerText = 'login via Spotify';
            }

            // close menu if click outside (polite)
            document.addEventListener('click', function(event) {
                const menu = document.getElementById('device-menu');
                const btn = document.getElementById('device-btn');
                if (menu.style.display === 'flex' && !menu.contains(event.target) && !btn.contains(event.target)) {
                    menu.style.display = 'none';
                }
            });
        })();
    </script>
</body>
</html>
