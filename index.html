<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synced Cloud Dashboard</title>
    <style>
        :root { --spotify-green: #1DB954; --bg-black: #121212; --card-grey: #181818; --text-grey: #b3b3b3; }
        body { background: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        #player-card { 
            background: var(--card-grey); padding: 1.5rem; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; 
            width: 300px; border: 1px solid #333; 
        }

        #album-art { 
            width: 220px; height: 220px; margin: 0 auto 15px; border-radius: 8px; 
            background-color: #282828; background-size: cover; background-position: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        #track-name { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #artist-name { color: var(--text-grey); font-size: 0.9rem; margin-bottom: 15px; }

        /* Progress Bar */
        #progress-container { width: 100%; height: 4px; background: #444; border-radius: 2px; margin-bottom: 15px; }
        #progress-bar { width: 0%; height: 100%; background: var(--spotify-green); border-radius: 2px; transition: width 0.5s linear; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .btn-main { background: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .btn-nav { background: none; border: none; color: var(--text-grey); cursor: pointer; font-size: 1.4rem; }
        .btn-nav:hover { color: white; }
        
        .login-btn { background: var(--spotify-green); color: black; border: none; padding: 12px 24px; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

    <div id="player-card">
        <div id="status" style="font-size: 0.8rem; color: var(--spotify-green); margin-bottom: 10px;">Connecting...</div>
        
        <div id="login-section" style="display:none;">
            <button class="login-btn" onclick="redirectToAuth()">Login with Spotify</button>
        </div>

        <div id="player-section" style="display:none;">
            <div id="album-art"></div>
            <div id="track-name">Nothing Playing</div>
            <div id="artist-name">Select Device</div>
            
            <div id="progress-container"><div id="progress-bar"></div></div>

            <div class="controls">
                <button class="btn-nav" onclick="player.previousTrack()">⏮</button>
                <button id="play-pause" class="btn-main" onclick="player.togglePlay()">▶</button>
                <button class="btn-nav" onclick="player.nextTrack()">⏭</button>
            </div>
        </div>
    </div>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script>
        const clientId = 'ccb3b4e6e11b48fc9ba11bc154e65534';
        const redirectUri = window.location.origin + window.location.pathname;
        let player;

        // --- AUTH HELPERS ---
        const generateRandomString = (l) => Array.from(crypto.getRandomValues(new Uint8Array(l))).map(x => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'[x % 62]).join('');
        const sha256 = async (p) => window.crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
        const base64encode = (i) => btoa(String.fromCharCode(...new Uint8Array(i))).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');

        async function redirectToAuth() {
            const v = generateRandomString(64);
            const c = base64encode(await sha256(v));
            localStorage.setItem('code_verifier', v);
            const p = new URLSearchParams({ response_type: 'code', client_id: clientId, scope: 'streaming user-read-playback-state user-modify-playback-state', code_challenge_method: 'S256', code_challenge: c, redirect_uri: redirectUri });
            window.location.href = `https://accounts.spotify.com/authorize?${p.toString()}`;
        }

        async function init() {
            const code = new URLSearchParams(window.location.search).get('code');
            if (code) {
                const v = localStorage.getItem('code_verifier');
                const r = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ client_id: clientId, grant_type: 'authorization_code', code, redirect_uri: redirectUri, code_verifier: v })
                });
                const d = await r.json();
                localStorage.setItem('access_token', d.access_token);
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            if (!localStorage.getItem('access_token')) {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('status').innerText = 'Sync Required';
            }
        }

        window.onSpotifyWebPlaybackSDKReady = () => {
            const token = localStorage.getItem('access_token');
            if (!token) return;

            player = new Spotify.Player({ name: 'Cloud Dashboard Player', getOAuthToken: cb => cb(token) });

            player.addListener('ready', ({ device_id }) => {
                document.getElementById('status').innerText = 'Synced';
                document.getElementById('player-section').style.display = 'block';
                document.getElementById('login-section').style.display = 'none';

                // AUTO-TRANSFER: Grab the music from your other devices
                fetch('https://api.spotify.com/v1/me/player', {
                    method: 'PUT',
                    body: JSON.stringify({ device_ids: [device_id], play: true }),
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
                });
            });

            player.addListener('player_state_changed', state => {
                if (!state) return;
                const track = state.track_window.current_track;
                document.getElementById('track-name').innerText = track.name;
                document.getElementById('artist-name').innerText = track.artists[0].name;
                document.getElementById('album-art').style.backgroundImage = `url(${track.album.images[0].url})`;
                document.getElementById('play-pause').innerText = state.paused ? '▶' : '⏸';
                document.getElementById('progress-bar').style.width = (state.position / state.duration) * 100 + '%';
            });

            player.connect();
        };
        init();
    </script>
</body>
</html>
