<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Dashboard - James</title>
    <style>
        :root {
            --sp-green: #1DB954;
            --bg-main: #121212;
            --bg-card: #181818;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #player-card {
            width: 380px;
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        #album-art {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            background-color: #282828;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        h2 { margin: 10px 0 5px; font-size: 1.2rem; }
        p { margin: 0; color: var(--text-dim); font-size: 0.9rem; }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.5rem;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.9); }

        #play-pause {
            background: white;
            color: black;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Login Overlay */
        #auth-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            border-radius: 12px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .login-btn {
            background: var(--sp-green);
            color: black;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            border: none;
        }

        #status {
            font-size: 0.7rem;
            color: var(--sp-green);
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="player-card">
    <div id="auth-overlay">
        <button class="login-btn" onclick="openAuthPopup()">Connect Spotify</button>
        <p style="margin-top: 10px; font-size: 0.7rem;">Dashboard will sync automatically</p>
    </div>

    <div id="album-art"></div>
    <h2 id="track-name">No Track</h2>
    <p id="artist-name">Waiting for playback...</p>

    <div class="controls">
        <button onclick="player.previousTrack()">⏮</button>
        <button id="play-pause" onclick="player.togglePlay()">▶</button>
        <button onclick="player.nextTrack()">⏭</button>
    </div>

    <div id="status">Disconnected</div>
</div>

<script src="https://sdk.scdn.co/spotify-player.js"></script>
<script>
    const CLIENT_ID = 'ccb3b4e6e11b48fc9ba11bc154e65534';
    // Use the exact URL of this dashboard as the redirect
    const REDIRECT_URI = window.location.origin + window.location.pathname; 
    
    let player;
    let deviceId;

    // 1. THE POPUP LOGIC
    // This function opens Spotify in a new window so index.html never reloads
    function openAuthPopup() {
        const scopes = 'streaming user-read-playback-state user-modify-playback-state user-read-currently-playing';
        const authUrl = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(scopes)}`;
        
        const width = 450, height = 700;
        const left = (window.screen.width / 2) - (width / 2);
        const top = (window.screen.height / 2) - (height / 2);
        
        window.open(authUrl, 'SpotifyLogin', `width=${width},height=${height},top=${top},left=${left}`);
    }

    // 2. THE MESSAGE LISTENER
    // This script checks if the page was opened as a popup or the main dashboard
    window.onload = () => {
        const hash = window.location.hash.substring(1).split('&').reduce((initial, item) => {
            if (item) {
                var parts = item.split('=');
                initial[parts[0]] = decodeURIComponent(parts[1]);
            }
            return initial;
        }, {});

        // IF THIS IS THE POPUP: Send token back to dashboard and close
        if (hash.access_token && window.opener) {
            window.opener.postMessage({ type: 'SPOTIFY_TOKEN', token: hash.access_token }, window.location.origin);
            window.close();
            return;
        }

        // IF THIS IS THE DASHBOARD: Check for saved token
        const savedToken = localStorage.getItem('spotify_token');
        if (savedToken) {
            initSpotifyPlayer(savedToken);
        } else {
            document.getElementById('auth-overlay').style.display = 'flex';
        }
    };

    // Listen for the token coming from the popup
    window.addEventListener('message', (event) => {
        if (event.origin !== window.location.origin) return;
        if (event.data.type === 'SPOTIFY_TOKEN') {
            const token = event.data.token;
            localStorage.setItem('spotify_token', token);
            document.getElementById('auth-overlay').style.display = 'none';
            initSpotifyPlayer(token);
        }
    });

    // 3. THE PLAYER LOGIC
    function initSpotifyPlayer(token) {
        window.onSpotifyWebPlaybackSDKReady = () => {
            player = new Spotify.Player({
                name: 'James Tablet Dashboard',
                getOAuthToken: cb => { cb(token); },
                volume: 0.5
            });

            player.addListener('ready', ({ device_id }) => {
                console.log('Ready with Device ID', device_id);
                deviceId = device_id;
                document.getElementById('status').innerText = 'James Dashboard Online';
            });

            player.addListener('player_state_changed', state => {
                if (!state) return;
                const track = state.track_window.current_track;
                document.getElementById('track-name').innerText = track.name;
                document.getElementById('artist-name').innerText = track.artists.map(a => a.name).join(', ');
                document.getElementById('album-art').style.backgroundImage = `url(${track.album.images[0].url})`;
                document.getElementById('play-pause').innerText = state.paused ? '▶' : '⏸';
            });

            player.addListener('authentication_error', () => {
                localStorage.removeItem('spotify_token');
                document.getElementById('auth-overlay').style.display = 'flex';
            });

            player.connect();
        };
        
        // If SDK is already loaded (manually triggering)
        if (window.Spotify) window.onSpotifyWebPlaybackSDKReady();
    }
</script>

</body>
</html>
