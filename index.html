<!DOCTYPE html>
<html lang="en">
<head>
    <title>Synced Spotify Dashboard</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #player-container { border: 1px solid #1db954; padding: 20px; border-radius: 15px; text-align: center; }
        button { background: #1db954; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="player-container">
        <h2>Spotify Sync</h2>
        <div id="status">Loading...</div>
        <br>
        <button id="auth-btn" style="display:none;">Login with Spotify</button>
        <div id="controls" style="display:none;">
            <p id="track-name">No Song Playing</p>
            <button onclick="player.togglePlay()">Play/Pause</button>
        </div>
    </div>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    
    <script>
        const clientId = 'YOUR_SPOTIFY_CLIENT_ID'; // <--- PASTE YOUR ID HERE
        const redirectUri = window.location.origin + window.location.pathname;
        let player;

        // 1. Check if we have a token in storage
        let accessToken = localStorage.getItem('access_token');

        if (!accessToken) {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (code) {
                // We just got redirected back with a code, exchange it for a token
                exchangeCodeForToken(code);
            } else {
                // Brand new user, show login
                document.getElementById('status').innerText = "Please authorize:";
                document.getElementById('auth-btn').style.display = 'block';
            }
        }

        document.getElementById('auth-btn').addEventListener('click', () => {
            const scope = 'streaming user-read-email user-read-private user-modify-playback-state user-read-playback-state';
            const authUrl = new URL("https://accounts.spotify.com/authorize");
            const params = {
                response_type: 'code',
                client_id: clientId,
                scope: scope,
                redirect_uri: redirectUri,
            };
            authUrl.search = new URLSearchParams(params).toString();
            window.location.href = authUrl.toString();
        });

        async function exchangeCodeForToken(code) {
            // In a real PKCE flow, you'd verify the 'state' and 'code_challenge'
            // For a basic cloud dashboard, we fetch the token:
            const response = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    client_id: clientId,
                    grant_type: 'authorization_code',
                    code: code,
                    redirect_uri: redirectUri,
                })
            });
            const data = await response.json();
            if (data.access_token) {
                localStorage.setItem('access_token', data.access_token);
                window.location.search = ''; // Clean URL
            }
        }

        // 2. Initialize Player
        window.onSpotifyWebPlaybackSDKReady = () => {
            if (!accessToken) return;

            player = new Spotify.Player({
                name: 'Cloud Dashboard Player',
                getOAuthToken: cb => { cb(accessToken); }
            });

            player.addListener('ready', ({ device_id }) => {
                document.getElementById('status').innerText = "Synced to Cloud";
                document.getElementById('controls').style.display = 'block';
                console.log('Ready with Device ID', device_id);
            });

            player.connect();
        };
    </script>
</body>
</html>
