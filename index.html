<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Compact Pro - Tablet Sync</title>
    <style>
        :root {
            --sp-green: #1DB954;
            --bg-main: #181818;
            --bg-card: #282828;
            --bg-elevated: #303030;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        * { box-sizing: border-box; }

        body {
            background: transparent;
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #player-container {
            position: relative;
            width: 380px;
            padding: 14px 14px 12px;
            border-radius: 16px;
            background: radial-gradient(circle at top left, #404040 0, #202020 35%, #121212 100%);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .top-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            grid-column-gap: 12px;
            align-items: center;
        }

        #album-art {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            background-color: #121212;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.6);
            transition: background-image 0.4s ease;
        }

        .meta { min-width: 0; }

        #track-name {
            font-size: 0.9rem;
            font-weight: 600;
            margin: 0 0 2px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #artist-name {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin: 0 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #device-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        #device-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1.25rem;
            padding: 4px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        #device-menu {
            position: absolute;
            top: 56px;
            right: 10px;
            background: var(--bg-elevated);
            border-radius: 10px;
            width: 200px;
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.95);
            z-index: 100;
            padding: 6px;
            border: 1px solid #3a3a3a;
            max-height: 140px;
            overflow-y: auto;
        }

        .device-option {
            padding: 7px 9px;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: #fff;
            text-align: left;
            width: 100%;
        }

        .device-option:hover { background: #3b3b3b; color: var(--sp-green); }
        .active-device { color: var(--sp-green); font-weight: 600; }

        #progress-row { display: flex; align-items: center; gap: 8px; }
        #time-current, #time-total { font-size: 0.7rem; color: var(--text-dim); min-width: 34px; }

        #progress-container {
            position: relative;
            flex: 1;
            height: 4px;
            background: #3d3d3d;
            border-radius: 999px;
            cursor: pointer;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--sp-green);
            border-radius: inherit;
        }

        .bottom-row { display: flex; align-items: center; justify-content: space-between; }
        .controls { display: flex; align-items: center; gap: 12px; }

        .btn-nav {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            font-size: 1.2rem;
        }

        #play-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #status-chip {
            font-size: 0.65rem;
            color: var(--text-dim);
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #status-dot { width: 6px; height: 6px; border-radius: 50%; background: #ff4f4f; }
        #status-chip.online #status-dot { background: var(--sp-green); box-shadow: 0 0 8px var(--sp-green); }

        #login-overlay {
            position: absolute;
            inset: 0;
            background: rgba(18, 18, 18, 0.98);
            border-radius: inherit;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            text-align: center;
            padding: 20px;
        }

        .login-btn {
            background: var(--sp-green);
            color: black;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div id="player-container">
    <div id="login-overlay">
        <h2 style="margin:0; font-size: 1.1rem;">Spotify Required</h2>
        <p style="font-size: 0.8rem; color: var(--text-dim);">Tap below to authorize this tablet.</p>
        <button class="login-btn" onclick="redirectToAuth()">Authorize Device</button>
    </div>

    <div class="top-row">
        <div id="album-art"></div>
        <div class="meta">
            <p id="track-name">Paused</p>
            <p id="artist-name">Waiting for playback...</p>
            <div id="device-label">No active device</div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px;">
            <div id="status-chip">
                <div id="status-dot"></div>
                <span id="status-text">Offline</span>
            </div>
            <button id="device-btn" onclick="toggleDevices()">📱</button>
        </div>
        <div id="device-menu"></div>
    </div>

    <div id="progress-row">
        <span id="time-current">0:00</span>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <span id="time-total">0:00</span>
    </div>

    <div class="bottom-row">
        <div class="controls">
            <button class="btn-nav" onclick="handlePrevious()">⏮</button>
            <button class="btn-nav" onclick="handleNext()">⏭</button>
        </div>
        <button id="play-btn" onclick="handlePlayToggle()">▶</button>
    </div>
</div>

<script src="https://sdk.scdn.co/spotify-player.js"></script>
<script>
    // --- TOP LEVEL POPUP CATCHER ---
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('code')) {
        if (window.opener) {
            window.opener.postMessage({ type: 'spotify-auth-success', code: urlParams.get('code') }, '*');
            window.close();
        }
    }

    const clientId = 'ccb3b4e6e11b48fc9ba11bc154e65534';
    const redirectUri = window.location.origin + window.location.pathname;

    let player = null;
    let currentDurationMs = 0;
    let lastKnownPositionMs = 0;
    let tickerId = null;
    let isScrubbing = false;

    // --- PKCE Helpers ---
    const generateRandomString = (l) => Array.from(crypto.getRandomValues(new Uint8Array(l))).map(x => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'[x % 62]).join('');
    const sha256 = async (plain) => window.crypto.subtle.digest('SHA-256', new TextEncoder().encode(plain));
    const base64encode = (input) => btoa(String.fromCharCode(...new Uint8Array(input))).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');

    async function redirectToAuth() {
        const v = generateRandomString(64);
        const hashed = await sha256(v);
        const c = base64encode(hashed);
        localStorage.setItem('code_verifier', v);

        const params = new URLSearchParams({
            response_type: 'code', client_id: clientId,
            scope: 'streaming user-read-playback-state user-modify-playback-state user-read-currently-playing',
            code_challenge_method: 'S256', code_challenge: c, redirect_uri: redirectUri
        });

        const authUrl = `https://accounts.spotify.com/authorize?${params.toString()}`;
        const width = 500, height = 700;
        const left = (window.screen.width / 2) - (width / 2);
        const top = (window.screen.height / 2) - (height / 2);
        window.open(authUrl, 'SpotifyLogin', `width=${width},height=${height},top=${top},left=${left}`);
    }

    window.addEventListener('message', async (event) => {
        if (event.data.type === 'spotify-auth-success') {
            const data = await getToken(event.data.code);
            if (data.access_token) {
                saveToken(data);
                location.reload();
            }
        }
    });

    async function getToken(code) {
        const v = localStorage.getItem('code_verifier');
        const res = await fetch('https://accounts.spotify.com/api/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ client_id: clientId, grant_type: 'authorization_code', code, redirect_uri: redirectUri, code_verifier: v })
        });
        return res.json();
    }

    function saveToken(data) {
        localStorage.setItem('access_token', data.access_token);
        if (data.refresh_token) localStorage.setItem('refresh_token', data.refresh_token);
        localStorage.setItem('expires_at', Date.now() + (data.expires_in * 1000));
    }

    async function getValidToken() {
        let token = localStorage.getItem('access_token');
        const expiresAt = parseInt(localStorage.getItem('expires_at') || '0');
        
        if (!token || Date.now() > (expiresAt - 60000)) {
            const refresh = localStorage.getItem('refresh_token');
            if (!refresh) return null;
            const res = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ client_id: clientId, grant_type: 'refresh_token', refresh_token: refresh })
            });
            const data = await res.json();
            if (data.access_token) {
                saveToken(data);
                return data.access_token;
            }
        }
        return token;
    }

    async function api(url, method = 'GET', body = null) {
        const token = await getValidToken();
        if (!token) return null;
        const res = await fetch(url, {
            method,
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: body ? JSON.stringify(body) : null
        });
        if (res.status === 204) return { success: true };
        if (res.status === 401) return null;
        return res.json();
    }

    // --- Player Logic ---
    async function updateUI() {
        const data = await api('https://api.spotify.com/v1/me/player');
        if (!data || !data.item) return;

        document.getElementById('track-name').textContent = data.item.name;
        document.getElementById('artist-name').textContent = data.item.artists[0].name;
        document.getElementById('album-art').style.backgroundImage = `url(${data.item.album.images[0].url})`;
        document.getElementById('play-btn').textContent = data.is_playing ? '⏸' : '▶';
        document.getElementById('device-label').textContent = data.device ? `On ${data.device.name}` : '';
        
        currentDurationMs = data.item.duration_ms;
        lastKnownPositionMs = data.progress_ms;
        
        renderProgress();
        data.is_playing ? startTicker() : stopTicker();
    }

    function renderProgress() {
        const ratio = (lastKnownPositionMs / currentDurationMs) * 100;
        document.getElementById('progress-bar').style.width = `${ratio}%`;
        document.getElementById('time-current').textContent = formatTime(lastKnownPositionMs);
        document.getElementById('time-total').textContent = formatTime(currentDurationMs);
    }

    function formatTime(ms) {
        const s = Math.floor(ms / 1000);
        return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
    }

    function startTicker() {
        if (tickerId) return;
        tickerId = setInterval(() => {
            if (!isScrubbing) {
                lastKnownPositionMs = Math.min(lastKnownPositionMs + 1000, currentDurationMs);
                renderProgress();
            }
        }, 1000);
    }
    function stopTicker() { clearInterval(tickerId); tickerId = null; }

    async function handlePlayToggle() {
        const state = await api('https://api.spotify.com/v1/me/player');
        const endpoint = state.is_playing ? 'pause' : 'play';
        await api(`https://api.spotify.com/v1/me/player/${endpoint}`, 'PUT');
        setTimeout(updateUI, 500);
    }

    async function handleNext() { await api('https://api.spotify.com/v1/me/player/next', 'POST'); setTimeout(updateUI, 500); }
    async function handlePrevious() { await api('https://api.spotify.com/v1/me/player/previous', 'POST'); setTimeout(updateUI, 500); }

    async function toggleDevices() {
        const menu = document.getElementById('device-menu');
        if (menu.style.display === 'flex') { menu.style.display = 'none'; return; }
        const data = await api('https://api.spotify.com/v1/me/player/devices');
        if (!data) return;
        menu.innerHTML = data.devices.map(d => `<button class="device-option ${d.is_active ? 'active-device' : ''}" onclick="transfer('${d.id}')">${d.name}</button>`).join('');
        menu.style.display = 'flex';
    }

    async function transfer(id) {
        await api('https://api.spotify.com/v1/me/player', 'PUT', { device_ids: [id] });
        document.getElementById('device-menu').style.display = 'none';
        setTimeout(updateUI, 800);
    }

    // --- Init ---
    window.onSpotifyWebPlaybackSDKReady = () => {
        player = new Spotify.Player({
            name: 'Tablet Dashboard Player',
            getOAuthToken: async cb => { const t = await getValidToken(); cb(t); }
        });

        player.addListener('ready', ({ device_id }) => {
            document.getElementById('status-chip').classList.add('online');
            document.getElementById('status-text').textContent = 'Synced';
        });

        player.connect();
    };

    async function start() {
        const token = await getValidToken();
        if (!token) {
            document.getElementById('login-overlay').style.display = 'flex';
        } else {
            setInterval(updateUI, 5000);
            updateUI();
        }
    }

    const container = document.getElementById('progress-container');
    container.onmousedown = (e) => {
        isScrubbing = true;
        const rect = container.getBoundingClientRect();
        const pos = Math.floor(((e.clientX - rect.left) / rect.width) * currentDurationMs);
        api(`https://api.spotify.com/v1/me/player/seek?position_ms=${pos}`, 'PUT');
        lastKnownPositionMs = pos;
        renderProgress();
    };
    window.onmouseup = () => isScrubbing = false;

    start();
</script>
</body>
</html>
