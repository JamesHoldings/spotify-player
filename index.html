<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Compact Pro - Synced</title>
    <style>
        :root {
            --sp-green: #1DB954;
            --bg-main: #181818;
            --bg-card: #282828;
            --bg-elevated: #303030;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: transparent;
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #player-container {
            position: relative;
            width: 380px;
            padding: 14px 14px 12px;
            border-radius: 16px;
            background: radial-gradient(circle at top left, #404040 0, #202020 35%, #121212 100%);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .top-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            grid-column-gap: 12px;
            align-items: center;
        }

        #album-art {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            background-color: #121212;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.6);
        }

        .meta {
            min-width: 0;
        }

        #track-name {
            font-size: 0.9rem;
            font-weight: 600;
            margin: 0 0 2px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #artist-name {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin: 0 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #device-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        #device-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1.25rem;
            padding: 4px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease;
        }

        #device-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--sp-green);
            transform: translateY(-1px);
        }

        #device-menu {
            position: absolute;
            top: 56px;
            right: 10px;
            background: var(--bg-elevated);
            border-radius: 10px;
            width: 200px;
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.95);
            z-index: 100;
            padding: 6px;
            border: 1px solid #3a3a3a;
            max-height: 140px;
            overflow-y: auto;
        }

        #device-menu::-webkit-scrollbar {
            width: 4px;
        }

        #device-menu::-webkit-scrollbar-thumb {
            background: #666;
            border-radius: 10px;
        }

        .device-option {
            padding: 7px 9px;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: #fff;
            text-align: left;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            transition: background 0.15s ease, color 0.15s ease, transform 0.08s ease;
        }

        .device-option:hover {
            background: #3b3b3b;
            color: var(--sp-green);
            transform: translateY(-1px);
        }

        .active-device {
            color: var(--sp-green);
            font-weight: 600;
        }

        #progress-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: -2px;
        }

        #time-current,
        #time-total {
            font-size: 0.7rem;
            color: var(--text-dim);
            min-width: 34px;
            text-align: center;
        }

        #progress-container {
            position: relative;
            flex: 1;
            height: 4px;
            background: #3d3d3d;
            border-radius: 999px;
            cursor: pointer;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffffff, var(--sp-green));
            border-radius: inherit;
            position: relative;
            transition: width 0.15s linear;
        }

        #progress-thumb {
            position: absolute;
            right: 0;
            top: 50%;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            transform: translate(50%, -50%);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.18);
        }

        .bottom-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 3px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-nav {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s ease, transform 0.08s ease, color 0.1s ease;
        }

        .btn-nav:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-1px);
        }

        .btn-nav:active {
            transform: translateY(0);
        }

        #play-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.9);
            transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.08s ease;
        }

        #play-btn:hover {
            transform: translateY(-1px) scale(1.02);
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.95);
        }

        #play-btn:active {
            transform: translateY(0) scale(0.98);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.8);
        }

        #time-display {
            display: none;
        }

        #status-chip {
            font-size: 0.7rem;
            color: var(--text-dim);
            background: rgba(0, 0, 0, 0.35);
            border-radius: 999px;
            padding: 2px 8px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        #status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--sp-green);
            box-shadow: 0 0 10px rgba(29, 185, 84, 0.9);
        }

        #status-chip.offline #status-dot {
            background: #ff4f4f;
            box-shadow: none;
        }

        #login-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(0, 0, 0, 0.3), rgba(5, 5, 5, 0.96));
            border-radius: inherit;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 18px;
            backdrop-filter: blur(12px);
        }

        #login-overlay h2 {
            margin: 0 0 6px 0;
            font-size: 0.95rem;
        }

        #login-overlay p {
            margin: 0 0 14px 0;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-align: center;
        }

        .login-btn {
            background: var(--sp-green);
            color: black;
            border: none;
            padding: 9px 22px;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.9);
            transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.08s ease;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.95);
        }

        .login-btn:active {
            transform: translateY(0);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.8);
        }

        .login-btn span.icon {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div id="player-container">
    <div id="login-overlay">
        <h2>Connect Spotify</h2>
        <p>To sync playback and controls, connect your Spotify account.</p>
        <button class="login-btn" onclick="redirectToAuth()">
            <span class="icon">🎧</span>
            <span>Connect &amp; Sync</span>
        </button>
    </div>

    <div class="top-row">
        <div id="album-art"></div>

        <div class="meta">
            <p id="track-name">Nothing Playing</p>
            <p id="artist-name">Ready &amp; Synced</p>
            <div id="device-label">No active device</div>
        </div>

        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
            <div id="status-chip" class="offline">
                <div id="status-dot"></div>
                <span id="status-text">Disconnected</span>
            </div>
            <button id="device-btn" onclick="toggleDevices()">📱</button>
        </div>

        <div id="device-menu"></div>
    </div>

    <div id="progress-row">
        <span id="time-current">0:00</span>
        <div id="progress-container">
            <div id="progress-bar">
                <div id="progress-thumb"></div>
            </div>
        </div>
        <span id="time-total">0:00</span>
    </div>

    <div class="bottom-row">
        <div class="controls">
            <button class="btn-nav" onclick="handlePrevious()">⏮</button>
            <button class="btn-nav" onclick="handleNext()">⏭</button>
        </div>
        <button id="play-btn" onclick="handlePlayToggle()">▶</button>
    </div>
</div>

<script src="https://sdk.scdn.co/spotify-player.js"></script>
<script>
    // --- CONFIGURATION (same auth as Synced Cloud Dashboard) ---
    const clientId = 'ccb3b4e6e11b48fc9ba11bc154e65534';
    const redirectUri = window.location.origin + window.location.pathname;

    let player = null;
    let currentDurationMs = 0;
    let lastKnownPositionMs = 0;
    let lastStatePaused = true;
    let isScrubbing = false;
    let pollIntervalId = null;
    let progressTickerId = null;
    let lastApiState = null;

    // ---------- AUTH (PKCE) — same as Synced Cloud Dashboard, no popups ----------

    // --- AUTH LOGIC (PKCE) ---
        const generateRandomString = (length) => {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            return Array.from(crypto.getRandomValues(new Uint8Array(length))).map((x) => possible[x % possible.length]).join('');
        }

        const sha256 = async (plain) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        }

        const base64encode = (input) => {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
        }

        async function redirectToAuth() {
            const codeVerifier = generateRandomString(64);
            const hashed = await sha256(codeVerifier);
            const codeChallenge = base64encode(hashed);

            window.localStorage.setItem('code_verifier', codeVerifier);

            const params = new URLSearchParams({
                response_type: 'code',
                client_id: clientId,
                scope: 'streaming user-read-playback-state user-modify-playback-state',
                code_challenge_method: 'S256',
                code_challenge: codeChallenge,
                redirect_uri: redirectUri,
            });

            window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
        }

        async function getToken(code) {
            const codeVerifier = window.localStorage.getItem('code_verifier');
            const response = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    client_id: clientId,
                    grant_type: 'authorization_code',
                    code: code,
                    redirect_uri: redirectUri,
                    code_verifier: codeVerifier,
                }),
            });
            return await response.json();
        }

        // --- INITIALIZATION ---
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (code) {
                const data = await getToken(code);
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            const token = localStorage.getItem('access_token');
            if (!token) {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('status').innerText = 'Logged Out';
            }
        }

    // ---------- TOKEN REFRESH (for API polling / controls) ----------

    async function refreshAccessToken() {
        const refreshToken = localStorage.getItem('refresh_token');
        if (!refreshToken) return null;
        const response = await fetch('https://accounts.spotify.com/api/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                client_id: clientId,
                grant_type: 'refresh_token',
                refresh_token: refreshToken
            })
        });
        const data = await response.json();
        if (data.access_token) {
            const expiresAt = Date.now() + (data.expires_in || 3600) * 1000;
            localStorage.setItem('access_token', data.access_token);
            localStorage.setItem('token_expires_at', String(expiresAt));
        }
        if (data.refresh_token) localStorage.setItem('refresh_token', data.refresh_token);
        return data.access_token || null;
    }

    async function ensureValidToken() {
        let token = localStorage.getItem('access_token');
        const expiresAtRaw = localStorage.getItem('token_expires_at');
        const expiresAt = expiresAtRaw ? parseInt(expiresAtRaw, 10) : 0;
        const now = Date.now();
        if (!token || !expiresAt || now > (expiresAt - 60000)) {
            token = await refreshAccessToken();
        }
        return token;
    }

    // ---------- API HELPERS ----------

    async function apiFetch(url, options = {}) {
        const token = await ensureValidToken();
        if (!token) {
            showLoginOverlay(true);
            return null;
        }
        let res;
        try {
            res = await fetch(url, {
                ...options,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    ...(options.body ? { 'Content-Type': 'application/json' } : {}),
                    ...(options.headers || {})
                }
            });
        } catch (err) {
            console.error('Spotify API request failed:', err);
            return null;
        }
        if (res.status === 401 || res.status === 403) {
            showLoginOverlay(true);
            return null;
        }
        if (res.status === 204) return {};
        if (!res.ok) {
            console.warn('Spotify API error', res.status, url);
            return null;
        }
        try {
            return await res.json();
        } catch (e) {
            return null;
        }
    }

    // ---------- PLAYBACK STATE FROM WEB API ----------

    function applyApiState(data) {
        if (!data || !data.item) {
            document.getElementById('track-name').textContent = 'Nothing Playing';
            document.getElementById('artist-name').textContent = 'Paused or no device';
            document.getElementById('album-art').style.backgroundImage = 'none';
            document.getElementById('play-btn').textContent = '▶';
            document.getElementById('device-label').textContent = data && data.device ? `Playing on ${data.device.name}` : 'No active device';
            updateProgressUI(0, 0);
            stopProgressTicker();
            return;
        }
        const track = data.item;
        const progressMs = data.progress_ms != null ? data.progress_ms : 0;
        const durationMs = track.duration_ms || 0;
        const isPlaying = !!data.is_playing;
        document.getElementById('track-name').textContent = track.name || 'Nothing Playing';
        document.getElementById('artist-name').textContent = (track.artists && track.artists[0]) ? track.artists[0].name : '';
        if (track.album && track.album.images && track.album.images.length) {
            document.getElementById('album-art').style.backgroundImage = `url(${track.album.images[0].url})`;
        } else {
            document.getElementById('album-art').style.backgroundImage = 'none';
        }
        document.getElementById('play-btn').textContent = isPlaying ? '⏸' : '▶';
        document.getElementById('device-label').textContent = data.device ? `Playing on ${data.device.name}` : 'No active device';
        currentDurationMs = durationMs;
        lastKnownPositionMs = progressMs;
        lastStatePaused = !isPlaying;
        lastApiState = data;
        updateProgressUI(progressMs, durationMs);
        if (isPlaying && durationMs > 0) startProgressTicker();
        else stopProgressTicker();
    }

    function startProgressTicker() {
        stopProgressTicker();
        progressTickerId = setInterval(() => {
            lastKnownPositionMs = Math.min(lastKnownPositionMs + 1000, currentDurationMs);
            updateProgressUI(lastKnownPositionMs, currentDurationMs);
            if (lastKnownPositionMs >= currentDurationMs) stopProgressTicker();
        }, 1000);
    }

    function stopProgressTicker() {
        if (progressTickerId) {
            clearInterval(progressTickerId);
            progressTickerId = null;
        }
    }

    async function pollPlaybackState() {
        const data = await apiFetch('https://api.spotify.com/v1/me/player');
        if (!data) return;
        if (data.item) {
            applyApiState(data);
            return;
        }
        if (data.device) {
            document.getElementById('device-label').textContent = `Playing on ${data.device.name}`;
            if (data.progress_ms != null && data.is_playing === false) {
                updateProgressUI(data.progress_ms || 0, 0);
                stopProgressTicker();
            }
            return;
        }
        if (Object.keys(data).length === 0) {
            document.getElementById('device-label').textContent = 'No active device';
        }
    }

    function startPolling() {
        stopPolling();
        pollIntervalId = setInterval(pollPlaybackState, 800);
        pollPlaybackState();
    }

    function stopPolling() {
        if (pollIntervalId) {
            clearInterval(pollIntervalId);
            pollIntervalId = null;
        }
        stopProgressTicker();
    }

    // ---------- DEVICE MENU ----------

    async function transferPlayback(deviceId, playImmediately = true) {
        await apiFetch('https://api.spotify.com/v1/me/player', {
            method: 'PUT',
            body: JSON.stringify({ device_ids: [deviceId], play: playImmediately })
        });
        document.getElementById('device-menu').style.display = 'none';
        setTimeout(pollPlaybackState, 300);
    }

    async function toggleDevices() {
        const menu = document.getElementById('device-menu');
        if (menu.style.display === 'flex') {
            menu.style.display = 'none';
            return;
        }
        const data = await apiFetch('https://api.spotify.com/v1/me/player/devices');
        if (!data || !data.devices) return;
        menu.innerHTML = '';
        data.devices.forEach(d => {
            const item = document.createElement('button');
            item.className = `device-option ${d.is_active ? 'active-device' : ''}`;
            item.innerHTML = `<span>${d.name}</span> <span style="font-size:0.6rem;">${d.is_active ? '●' : ''}</span>`;
            item.onclick = () => transferPlayback(d.id, true);
            menu.appendChild(item);
        });
        menu.style.display = 'flex';
    }

    // ---------- CONTROLS VIA WEB API ----------

    async function handlePlayToggle() {
        const data = await apiFetch('https://api.spotify.com/v1/me/player');
        if (!data) return;
        if (data.is_playing) {
            await apiFetch('https://api.spotify.com/v1/me/player/pause', { method: 'PUT' });
        } else {
            await apiFetch('https://api.spotify.com/v1/me/player/play', { method: 'PUT', body: JSON.stringify({}) });
        }
        setTimeout(pollPlaybackState, 150);
    }

    async function handleNext() {
        const r = await apiFetch('https://api.spotify.com/v1/me/player/next', { method: 'POST' });
        if (r !== null) setTimeout(pollPlaybackState, 150);
    }

    async function handlePrevious() {
        const r = await apiFetch('https://api.spotify.com/v1/me/player/previous', { method: 'POST' });
        if (r !== null) setTimeout(pollPlaybackState, 150);
    }

    // ---------- SCRUB BAR ----------

    function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const mins = Math.floor(totalSeconds / 60);
        const secs = totalSeconds % 60;
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function attachScrubHandlers() {
        const progressContainer = document.getElementById('progress-container');
        function seekFromEvent(e) {
            const rect = progressContainer.getBoundingClientRect();
            const x = (e.touches && e.touches[0]) ? e.touches[0].clientX - rect.left : e.clientX - rect.left;
            const ratio = Math.max(0, Math.min(1, x / rect.width));
            const duration = currentDurationMs || 1;
            const newPos = Math.floor(ratio * duration);
            apiFetch(`https://api.spotify.com/v1/me/player/seek?position_ms=${newPos}`, { method: 'PUT' }).then((result) => {
                if (result !== null) {
                    lastKnownPositionMs = newPos;
                    updateProgressUI(newPos, currentDurationMs);
                    setTimeout(pollPlaybackState, 150);
                }
            });
        }
        progressContainer.addEventListener('mousedown', (e) => {
            e.preventDefault();
            isScrubbing = true;
            seekFromEvent(e);
        });
        window.addEventListener('mousemove', (e) => {
            if (!isScrubbing) return;
            seekFromEvent(e);
        });
        window.addEventListener('mouseup', () => { isScrubbing = false; });
        progressContainer.addEventListener('touchstart', (e) => {
            isScrubbing = true;
            seekFromEvent(e.touches[0]);
        }, { passive: false });
        window.addEventListener('touchmove', (e) => {
            if (!isScrubbing) return;
            e.preventDefault();
            seekFromEvent(e.touches[0]);
        }, { passive: false });
        window.addEventListener('touchend', () => { isScrubbing = false; });
    }

    function updateProgressUI(positionMs, durationMs) {
        const progressBar = document.getElementById('progress-bar');
        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');
        currentDurationMs = durationMs || 0;
        lastKnownPositionMs = positionMs || 0;
        const ratio = durationMs ? (positionMs / durationMs) : 0;
        progressBar.style.width = `${Math.max(0, Math.min(100, ratio * 100))}%`;
        timeCurrent.textContent = formatTime(positionMs);
        timeTotal.textContent = durationMs ? formatTime(durationMs) : '0:00';
    }

    function showLoginOverlay(show) {
        document.getElementById('login-overlay').style.display = show ? 'flex' : 'none';
        const statusChip = document.getElementById('status-chip');
        const statusText = document.getElementById('status-text');
        if (show) {
            statusChip.classList.add('offline');
            statusText.textContent = 'Disconnected';
            stopPolling();
        } else {
            statusChip.classList.remove('offline');
            statusText.textContent = 'Connected';
            startPolling();
        }
    }

    // ---------- INIT (auth same as Synced Cloud Dashboard) ----------

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code) {
            const data = await getToken(code);
            if (data.access_token) {
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                const expiresAt = Date.now() + (data.expires_in || 3600) * 1000;
                localStorage.setItem('token_expires_at', String(expiresAt));
            }
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        const token = localStorage.getItem('access_token');
        if (!token) {
            showLoginOverlay(true);
        } else {
            showLoginOverlay(false);
        }

        attachScrubHandlers();
    }

    window.onSpotifyWebPlaybackSDKReady = async () => {
        const initialToken = localStorage.getItem('access_token');
        if (!initialToken) {
            showLoginOverlay(true);
            return;
        }

        player = new Spotify.Player({
            name: 'James Dashboard',
            getOAuthToken: async cb => {
                const token = await ensureValidToken();
                if (token) cb(token);
            },
            volume: 0.8
        });

        player.addListener('ready', ({ device_id }) => {
            showLoginOverlay(false);
            startPolling();
        });

        player.addListener('not_ready', ({ device_id }) => {});
        player.addListener('player_state_changed', (state) => {
            if (state) applyApiState({
                item: state.track_window.current_track,
                progress_ms: state.position,
                is_playing: !state.paused,
                device: { name: 'James Dashboard' }
            });
        });
        player.addListener('initialization_error', ({ message }) => console.error(message));
        player.addListener('authentication_error', ({ message }) => {
            console.error(message);
            showLoginOverlay(true);
        });
        player.addListener('account_error', ({ message }) => console.error(message));

        player.connect();
    };

    init();
</script>
</body>
</html>
