<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synced Dashboard Player</title>
    <style>
        :root { --sp-green: #1DB954; --sp-black: #000000; --sp-grey: #121212; --sp-light: #b3b3b3; }
        body { background: transparent; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 10px; overflow: hidden; }
        
        /* Mimicking the Spotify Iframe Design */
        #embed-container {
            background: var(--sp-grey);
            border-radius: 12px;
            width: 100%;
            height: 352px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #282828;
            position: relative;
            transition: all 0.5s ease;
        }

        #album-art {
            width: 160px;
            height: 160px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            background: #282828;
            background-size: cover;
            margin-bottom: 15px;
        }

        #track-info { text-align: center; width: 80%; }
        #track-name { font-size: 1.1rem; font-weight: bold; margin: 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #artist-name { color: var(--sp-light); font-size: 0.9rem; margin-bottom: 20px; }

        .btn { background: var(--sp-green); color: black; border: none; padding: 12px 28px; border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; }
        
        #login-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; border-radius: 12px; z-index: 10; }
    </style>
</head>
<body>

    <div id="embed-container">
        <div id="login-overlay" style="display:none;">
            <button class="btn" onclick="redirectToAuth()">Connect Spotify</button>
        </div>

        <div id="album-art"></div>
        <div id="track-info">
            <div id="track-name">No Active Device</div>
            <div id="artist-name">Select 'Cloud Player' on your phone</div>
        </div>
        <button class="btn" id="play-pause">Play</button>
    </div>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script>
        const clientId = 'YOUR_CLIENT_ID_HERE';
        const redirectUri = window.location.origin + window.location.pathname;

        // --- PKCE & AUTH FUNCTIONS (Keep these from previous step) ---
        async function redirectToAuth() {
            const verifier = generateRandomString(64);
            const challenge = await base64encode(await sha256(verifier));
            localStorage.setItem('code_verifier', verifier);
            const params = new URLSearchParams({ response_type: 'code', client_id: clientId, scope: 'streaming user-read-playback-state', code_challenge_method: 'S256', code_challenge: challenge, redirect_uri: redirectUri });
            window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
        }

        // ... [Insert previous SHA256/Base64 helper functions here for brevity] ...

        window.onSpotifyWebPlaybackSDKReady = () => {
            const token = localStorage.getItem('access_token');
            if (!token) { document.getElementById('login-overlay').style.display = 'flex'; return; }

            const player = new Spotify.Player({
                name: 'Cloud Dashboard Player',
                getOAuthToken: cb => { cb(token); }
            });

            player.addListener('player_state_changed', state => {
                if (!state) return;
                const track = state.track_window.current_track;
                document.getElementById('track-name').innerText = track.name;
                document.getElementById('artist-name').innerText = track.artists[0].name;
                document.getElementById('album-art').style.backgroundImage = `url(${track.album.images[0].url})`;
                document.getElementById('play-pause').innerText = state.paused ? 'Play' : 'Pause';
            });

            player.connect();
        };
    </script>
</body>
</html>
