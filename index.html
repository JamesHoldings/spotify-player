<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Compact Dashboard</title>
    <style>
        :root { --sp-green: #1DB954; --bg-grey: #404040; --text-main: #ffffff; --text-dim: #b3b3b3; }
        body { background: transparent; color: var(--text-main); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Main Container matching the Compact UI */
        #player-container { 
            background: var(--bg-grey); width: 340px; height: 150px; padding: 12px; 
            border-radius: 12px; display: flex; flex-direction: column; gap: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5); position: relative;
        }

        /* Top Section: Art and Meta */
        .top-row { display: flex; gap: 12px; height: 80px; }
        #album-art { width: 80px; height: 80px; border-radius: 6px; background-size: cover; background-color: #282828; flex-shrink: 0; }
        
        .meta { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        #track-name { font-size: 0.95rem; font-weight: bold; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #artist-name { font-size: 0.8rem; color: var(--text-dim); margin: 2px 0 0 0; }

        /* Progress Bar */
        #progress-container { width: 100%; height: 4px; background: #5e5e5e; border-radius: 2px; }
        #progress-bar { width: 0%; height: 100%; background: var(--text-main); border-radius: 2px; }

        /* Bottom Section: Controls */
        .bottom-row { display: flex; align-items: center; justify-content: space-between; padding-top: 4px; }
        .controls { display: flex; align-items: center; gap: 15px; }
        
        .btn-nav { background: none; border: none; color: var(--text-main); cursor: pointer; font-size: 1.2rem; padding: 0; }
        #play-btn { background: white; color: black; border: none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        #spotify-logo { width: 20px; height: 20px; opacity: 0.8; }
        #time-display { font-size: 0.75rem; color: var(--text-dim); }

        /* Utility */
        #login-section { position: absolute; inset: 0; background: var(--bg-grey); border-radius: 12px; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .login-btn { background: var(--sp-green); color: black; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="player-container">
        <div id="login-section" style="display:none;">
            <button class="login-btn" onclick="redirectToAuth()">Connect Spotify</button>
        </div>

        <div class="top-row">
            <div id="album-art"></div>
            <div class="meta">
                <p id="track-name">Nothing Playing</p>
                <p id="artist-name">Open Spotify on phone</p>
                <p style="font-size: 0.7rem; color: var(--text-dim); margin-top: 8px;">My Liked Songs • James</p>
            </div>
            <img id="spotify-logo" src="https://storage.googleapis.com/pr-newsroom-wp/1/2018/11/Spotify_Logo_RGB_White.png" alt="">
        </div>

        <div id="progress-container"><div id="progress-bar"></div></div>

        <div class="bottom-row">
            <div class="controls">
                <button class="btn-nav" onclick="player.previousTrack()">⏮</button>
                <button class="btn-nav" onclick="player.nextTrack()">⏭</button>
                <div id="time-display">00:00</div>
            </div>
            <button id="play-btn" onclick="player.togglePlay()">▶</button>
        </div>
    </div>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script>
        const clientId = 'ccb3b4e6e11b48fc9ba11bc154e65534';
        const redirectUri = window.location.origin + window.location.pathname;
        let player;

        // PKCE Auth
        const rand = (l) => Array.from(crypto.getRandomValues(new Uint8Array(l))).map(x => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'[x % 62]).join('');
        const hash = async (p) => window.crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
        const enc = (i) => btoa(String.fromCharCode(...new Uint8Array(i))).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');

        async function redirectToAuth() {
            const v = rand(64);
            const c = enc(await hash(v));
            localStorage.setItem('code_verifier', v);
            const p = new URLSearchParams({ response_type: 'code', client_id: clientId, scope: 'streaming user-read-playback-state user-modify-playback-state', code_challenge_method: 'S256', code_challenge: c, redirect_uri: redirectUri });
            window.location.href = `https://accounts.spotify.com/authorize?${p.toString()}`;
        }

        async function init() {
            const code = new URLSearchParams(window.location.search).get('code');
            if (code) {
                const v = localStorage.getItem('code_verifier');
                const r = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ client_id: clientId, grant_type: 'authorization_code', code, redirect_uri: redirectUri, code_verifier: v })
                });
                const d = await r.json();
                localStorage.setItem('access_token', d.access_token);
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            if (!localStorage.getItem('access_token')) document.getElementById('login-section').style.display = 'flex';
        }

        window.onSpotifyWebPlaybackSDKReady = () => {
            const token = localStorage.getItem('access_token');
            if (!token) return;

            player = new Spotify.Player({ name: 'Cloud Dashboard Player', getOAuthToken: cb => cb(token) });

            player.addListener('ready', ({ device_id }) => {
                fetch('https://api.spotify.com/v1/me/player', {
                    method: 'PUT',
                    body: JSON.stringify({ device_ids: [device_id], play: true }),
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
                });
            });

            player.addListener('player_state_changed', state => {
                if (!state) return;
                const track = state.track_window.current_track;
                document.getElementById('track-name').innerText = track.name;
                document.getElementById('artist-name').innerText = track.artists[0].name;
                document.getElementById('album-art').style.backgroundImage = `url(${track.album.images[0].url})`;
                document.getElementById('play-btn').innerText = state.paused ? '▶' : '⏸';
                
                const percent = (state.position / state.duration) * 100;
                document.getElementById('progress-bar').style.width = percent + '%';
                
                const mins = Math.floor(state.position / 60000);
                const secs = ((state.position % 60000) / 1000).toFixed(0);
                document.getElementById('time-display').innerText = mins + ":" + (secs < 10 ? '0' : '') + secs;
            });

            player.connect();
        };
        init();
    </script>
</body>
</html>
